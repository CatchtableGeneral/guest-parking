<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>손님주차 앱 설치</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Pretendard', sans-serif;
  background: #0a0a0a; color: #f5f5f7;
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 24px;
}
.card {
  background: #1c1c1e; border-radius: 20px;
  padding: 32px 24px; max-width: 380px; width: 100%;
  text-align: center;
}
.logo {
  width: 64px; height: 64px; border-radius: 16px;
  background: linear-gradient(135deg, #ff3d00, #ff6e40);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; font-weight: 900; color: #fff;
  margin: 0 auto 20px;
  box-shadow: 0 4px 20px rgba(255,61,0,.3);
}
h1 { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
.sub { font-size: 14px; color: rgba(255,255,255,.5); margin-bottom: 28px; }
.btn {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 16px; border-radius: 14px;
  font-size: 16px; font-weight: 700; text-decoration: none;
  transition: transform 0.15s, opacity 0.15s;
  margin-bottom: 12px;
}
.btn:active { transform: scale(0.97); }
.btn-ios {
  background: #007aff; color: #fff;
}
.btn-aos {
  background: #34c759; color: #fff;
}
.btn-icon { font-size: 22px; }
.divider {
  display: flex; align-items: center; gap: 12px;
  margin: 20px 0; color: rgba(255,255,255,.25); font-size: 12px;
}
.divider::before, .divider::after {
  content: ''; flex: 1; height: 1px; background: rgba(255,255,255,.1);
}
.help {
  font-size: 13px; color: rgba(255,255,255,.35); line-height: 1.7;
  margin-top: 8px;
}
.help strong { color: rgba(255,255,255,.55); font-weight: 600; }
.footer {
  margin-top: 24px; font-size: 11px; color: rgba(255,255,255,.2);
}
</style>
<script>
// 기기 OS 자동 감지 → 해당 버튼 강조
document.addEventListener('DOMContentLoaded', function() {
  var ua = navigator.userAgent;
  var isIOS = /iPad|iPhone|iPod/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  var isAndroid = /Android/.test(ua);

  if (isIOS) {
    document.getElementById('btn-ios').style.order = '-1';
    document.getElementById('btn-aos').style.opacity = '0.4';
  } else if (isAndroid) {
    document.getElementById('btn-aos').style.order = '-1';
    document.getElementById('btn-ios').style.opacity = '0.4';
  }
});
</script>
</head>
<body>
  <div class="card">
    <div class="logo">P</div>
    <h1>손님 주차할인</h1>
    <p class="sub">캐치테이블 방문차량 주차할인 등록</p>

    <div style="display:flex;flex-direction:column;">
      <a id="btn-ios" class="btn btn-ios" href="./guest_parking.mobileconfig">
        <span class="btn-icon">🍎</span> iPhone 설치
      </a>
      <a id="btn-aos" class="btn btn-aos" href="./app-guest.apk">
        <span class="btn-icon">🤖</span> Android 설치
      </a>
    </div>

    <div class="divider">설치 안내</div>
    <div class="help">
      <strong>iPhone</strong>: 버튼 탭 → 설정에서 "프로파일 다운로드됨" → 설치<br>
      <strong>Android</strong>: 버튼 탭 → 다운로드 완료 후 파일 열기 → 설치
    </div>
  </div>
  <div class="footer">© 캐치테이블 경영지원</div>
</body>
</html>
