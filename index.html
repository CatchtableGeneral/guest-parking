<title>손님 주차할인</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800;900&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">

<style>
/* ============================================================
   DESIGN SYSTEM — same as employee version
   ============================================================ */
:root {
  /* Surface */
  --bg-base: #0a0a0a;
  --bg-elevated: #141414;
  --bg-card: #1c1c1e;
  --bg-card-hover: #252528;
  --bg-input: #1c1c1e;
  --bg-input-focus: #222225;
  --border-subtle: rgba(255,255,255,.06);
  --border-default: rgba(255,255,255,.1);
  --border-focus: rgba(255,61,0,.5);

  /* Brand */
  --accent: #ff3d00;
  --accent-hover: #ff5722;
  --accent-soft: rgba(255,61,0,.12);
  --accent-glow: rgba(255,61,0,.25);

  /* Semantic */
  --green: #34d399;
  --green-soft: rgba(52,211,153,.12);
  --red: #f87171;
  --red-soft: rgba(248,113,113,.12);
  --blue: #60a5fa;
  --blue-soft: rgba(96,165,250,.12);
  --yellow: #fbbf24;
  --yellow-soft: rgba(251,191,36,.12);
  --purple: #a78bfa;
  --purple-soft: rgba(167,139,250,.12);

  /* Text */
  --text-primary: #f5f5f7;
  --text-secondary: rgba(255,255,255,.55);
  --text-tertiary: rgba(255,255,255,.3);

  /* Spacing */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 12px;
  --space-lg: 16px;
  --space-xl: 24px;
  --space-2xl: 32px;
  --space-3xl: 48px;

  /* Radius */
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-2xl: 24px;
  --radius-full: 9999px;

  /* Shadows */
  --shadow-sm: 0 1px 2px rgba(0,0,0,.3);
  --shadow-md: 0 4px 12px rgba(0,0,0,.4);
  --shadow-lg: 0 8px 32px rgba(0,0,0,.5);
  --shadow-glow: 0 0 24px var(--accent-glow);

  /* Transition */
  --ease-out: cubic-bezier(.16,1,.3,1);
  --ease-spring: cubic-bezier(.34,1.56,.64,1);
  --duration-fast: 150ms;
  --duration-normal: 250ms;
  --duration-slow: 400ms;

  /* Safe area */
  --sat: env(safe-area-inset-top, 0px);
  --sab: env(safe-area-inset-bottom, 0px);
}

/* ============================================================
   RESET & BASE
   ============================================================ */
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
html,body {
  width:100%; height:100%; overflow:hidden;
  font-family:'Pretendard','Noto Sans KR',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg-base); color:var(--text-primary);
  -webkit-text-size-adjust:100%;
  -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
  user-select:none; -webkit-user-select:none;
  line-height:1.5;
}
input,select,textarea,button { font-family:inherit; }
input,select,textarea { font-size:16px!important; }
button { cursor:pointer; border:none; background:none; color:inherit; }

/* Material Symbols */
.material-symbols-rounded {
  font-family:'Material Symbols Rounded';
  font-weight:normal; font-style:normal; font-size:24px;
  display:inline-block; line-height:1; text-transform:none;
  letter-spacing:normal; word-wrap:normal; white-space:nowrap;
  direction:ltr;
  -webkit-font-smoothing:antialiased;
  font-variation-settings: 'FILL' 1, 'wght' 500, 'opsz' 24;
}

/* ============================================================
   LAYOUT SHELL
   ============================================================ */
#app {
  width:100%; height:100%;
  display:flex; flex-direction:column;
  overflow:hidden; position:relative;
  padding-top:var(--sat);
}
.screen {
  display:none; flex-direction:column; flex:1;
  overflow:hidden; position:relative;
}
.screen.active {
  display:flex;
  animation:screenIn var(--duration-normal) var(--ease-out);
}
@keyframes screenIn {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes slideUp {
  from { opacity:0; transform:translateY(100%); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}
@keyframes spin { to{transform:rotate(360deg)} }

/* ============================================================
   HEADER BAR
   ============================================================ */
.k-header {
  display:flex; justify-content:space-between; align-items:center;
  padding:var(--space-md) var(--space-xl);
  background:linear-gradient(180deg,rgba(10,10,10,.95) 0%,rgba(10,10,10,.85) 100%);
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border-subtle);
  flex-shrink:0; z-index:10;
}
.k-header-left { display:flex; align-items:center; gap:10px; }
.k-logo {
  width:36px; height:36px; border-radius:10px;
  background:linear-gradient(135deg,#ff3d00 0%,#ff6e40 100%);
  display:flex; align-items:center; justify-content:center;
  font-weight:900; font-size:18px; color:#fff;
  box-shadow:0 2px 10px rgba(255,61,0,.3);
}
.k-header-title {
  font-size:17px; font-weight:700; letter-spacing:-.3px;
  color:var(--text-primary);
}
.k-header-right { display:flex; align-items:center; gap:var(--space-sm); }
.k-header-time {
  font-size:14px; font-weight:500; color:var(--text-secondary);
  font-variant-numeric:tabular-nums;
}
.k-balance-bar {
  text-align:center; padding:6px var(--space-xl) 5px;
  background:rgba(10,10,10,.9);
  border-bottom:1px solid var(--border-subtle);
  flex-shrink:0;
}
.k-balance {
  padding:3px 10px; border-radius:var(--radius-full);
  font-size:11px; font-weight:700; letter-spacing:-.2px;
  font-variant-numeric:tabular-nums;
  background:rgba(255,183,77,.12); color:#ffb74d;
  white-space:nowrap;
  transition:opacity .3s ease;
}
.k-balance.loading { opacity:.4; }
.k-balance.error { background:rgba(244,67,54,.1); color:#ef5350; }

/* ============================================================
   UPDATE NOTIFICATION / CHANGELOG
   ============================================================ */
.update-overlay {
  display:none; position:fixed; top:0; left:0; right:0; bottom:0;
  background:rgba(0,0,0,.7); backdrop-filter:blur(8px);
  z-index:99999; align-items:center; justify-content:center;
}
.update-overlay.show { display:flex; }
.update-box {
  background:var(--bg-card); border-radius:var(--radius-xl);
  padding:28px 24px 20px; max-width:360px; width:92%;
  box-shadow:var(--shadow-lg);
  border:1px solid var(--border-default);
  animation:fadeIn .3s ease;
  max-height:80vh; display:flex; flex-direction:column; overflow:hidden;
}
.update-box .update-header {
  text-align:center; margin-bottom:20px; flex-shrink:0;
}
#updateContent, #changelogContent {
  flex:1; overflow-y:auto; min-height:0;
}
.update-box .update-icon {
  font-size:44px; color:var(--accent); margin-bottom:12px;
  display:block;
}
.update-box h3 {
  font-size:17px; font-weight:700; color:var(--text-primary);
  margin:0 0 4px;
}
.update-box .update-ver {
  font-size:13px; color:var(--text-secondary); margin:0;
}
.update-box .changelog-section, .modal-body .changelog-section {
  margin-bottom:16px;
}
.update-box .changelog-section .cl-title, .modal-body .changelog-section .cl-title {
  font-size:14px; font-weight:700; color:var(--text-primary);
  margin:0 0 8px; display:flex; align-items:center; gap:8px;
}
.update-box .changelog-section .cl-date, .modal-body .changelog-section .cl-date {
  font-size:11px; font-weight:400; color:var(--text-tertiary);
}
.update-box .cl-item, .modal-body .cl-item {
  display:flex; align-items:flex-start; gap:8px;
  padding:6px 0; font-size:13px; color:var(--text-secondary);
  line-height:1.4;
}
.cl-tag {
  flex-shrink:0; padding:2px 7px; border-radius:4px;
  font-size:10px; font-weight:700; letter-spacing:-.2px;
  white-space:nowrap;
}
.cl-tag.feat { background:var(--blue-soft); color:var(--blue); }
.cl-tag.fix { background:var(--green-soft); color:var(--green); }
.cl-tag.improve { background:var(--purple-soft); color:var(--purple); }
.cl-tag.remove { background:var(--red-soft); color:var(--red); }
.update-box .update-btn {
  width:100%; padding:13px; border:none; border-radius:var(--radius-md);
  background:var(--accent); color:#fff; font-size:15px; font-weight:700;
  cursor:pointer; transition:background .2s; margin-top:8px;
  flex-shrink:0;
}
.update-box .update-btn:active { background:var(--accent-hover); }
.update-box .update-btn.secondary {
  background:var(--bg-input); color:var(--text-secondary); margin-top:8px;
}
.update-box .update-btn.secondary:active { background:var(--bg-input-focus); }

/* ★ 왼쪽 상단 상시 아이콘 (업데이트 내역) */
.changelog-fab {
  position:fixed; left:12px; top:calc(60px + env(safe-area-inset-top, 0px)); z-index:9990;
  width:36px; height:36px; border-radius:50%;
  background:var(--bg-card); border:1px solid var(--border-default);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; box-shadow:var(--shadow-md);
  transition:transform .2s, box-shadow .2s;
}
.changelog-fab:active { transform:scale(.92); }
.changelog-fab .material-symbols-rounded {
  font-size:18px; color:var(--text-secondary);
}
.changelog-fab .fab-dot {
  position:absolute; top:1px; right:1px;
  width:7px; height:7px; border-radius:50%;
  background:var(--accent); display:none;
}
.changelog-fab .fab-dot.show { display:block; }
.fab-comment {
  position:absolute; left:calc(100% + 8px); top:50%; transform:translateY(-50%);
  white-space:nowrap; font-size:11px; font-weight:700;
  color:var(--accent); background:rgba(255,61,0,0.07);
  padding:5px 12px; border-radius:20px;
  display:none; pointer-events:none;
  animation:fabCommentPulse 3s ease-in-out infinite;
}
.fab-comment.show { display:block; }
@keyframes fabCommentPulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
.reg-changelog-hint {
  display:flex; align-items:center; gap:4px;
  cursor:pointer; padding:4px 10px;
  background:rgba(255,61,0,0.06);
  border-radius:20px; border:none;
  transition:opacity .2s;
}
.reg-changelog-hint:active { opacity:0.6; }
.k-badge {
  padding:5px 12px; border-radius:var(--radius-full);
  font-size:12px; font-weight:600; letter-spacing:-.2px;
  background:var(--green-soft); color:var(--green);
}

/* ============================================================
   SESSION BANNER
   ============================================================ */
.session-banner {
  display:none; padding:8px 20px; text-align:center;
  font-size:12px; font-weight:600; flex-shrink:0;
  animation:fadeIn .3s;
}
.session-banner.warn { background:var(--yellow-soft); color:var(--yellow); }
.session-banner.ok   { background:var(--green-soft); color:var(--green); }
.session-banner.show { display:block; }

/* ============================================================
   PHONE VERIFICATION SCREEN
   ============================================================ */
#phoneScreen .phone-body {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:var(--space-xl); padding:var(--space-3xl) var(--space-xl);
}
.phone-card {
  background:var(--bg-elevated); border:1px solid var(--border-subtle);
  border-radius:var(--radius-xl); padding:var(--space-2xl) var(--space-xl);
  width:100%; max-width:400px;
  display:flex; flex-direction:column; gap:var(--space-lg);
  position:relative; overflow:hidden;
}
.phone-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
  background:linear-gradient(90deg,var(--accent),#ff6e40,var(--blue));
}
.phone-card h2 {
  font-size:22px; font-weight:800; text-align:center;
  letter-spacing:-.3px; margin-top:var(--space-sm);
}
.phone-card p {
  font-size:14px; color:var(--text-secondary);
  text-align:center; line-height:1.6;
}
.phone-status {
  font-size:12px; font-weight:500; text-align:center; min-height:18px;
}
.phone-status.ok { color:var(--green); }
.phone-status.err { color:var(--red); }

#codeSection {
  display:none; flex-direction:column; gap:var(--space-lg);
  animation:fadeIn .3s;
}
#codeSection.show { display:flex; }

/* ============================================================
   HOME SCREEN
   ============================================================ */
#homeScreen .home-body {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:var(--space-2xl); padding:var(--space-2xl) var(--space-xl);
  position:relative; overflow:hidden;
}
#homeScreen .home-body::before {
  content:''; position:absolute;
  top:-30%; right:-20%; width:400px; height:400px;
  background:radial-gradient(circle,rgba(255,61,0,.08) 0%,transparent 70%);
  pointer-events:none;
}
#homeScreen .home-body::after {
  content:''; position:absolute;
  bottom:-20%; left:-15%; width:350px; height:350px;
  background:radial-gradient(circle,rgba(96,165,250,.06) 0%,transparent 70%);
  pointer-events:none;
}
.home-hero { text-align:center; position:relative; z-index:1; }
.home-greeting {
  font-size:26px; font-weight:300;
  color:var(--text-secondary); letter-spacing:-.5px; line-height:1.5;
}
.home-greeting strong {
  font-weight:800; display:block; font-size:32px;
  color:var(--text-primary); margin-top:4px;
}
.home-greeting .sub {
  display:block; font-size:14px; font-weight:500;
  color:var(--text-tertiary); margin-top:8px; letter-spacing:0;
}

.home-register-btn {
  width:100%; max-width:320px;
  padding:28px; border-radius:var(--radius-2xl);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:var(--space-lg);
  background:linear-gradient(145deg,#ff3d00 0%,#ff5722 50%,#ff6e40 100%);
  color:#fff; box-shadow:0 8px 32px rgba(255,61,0,.3);
  border:1px solid rgba(255,110,64,.2);
  position:relative; overflow:hidden;
  transition:transform var(--duration-fast) var(--ease-spring);
}
.home-register-btn::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(180deg,rgba(255,255,255,.08) 0%,transparent 50%);
  pointer-events:none;
}
.home-register-btn:active { transform:scale(.95); }
.home-register-btn .material-symbols-rounded { font-size:64px; opacity:.95; }
.home-register-btn .btn-label { font-size:22px; font-weight:800; letter-spacing:-.3px; }

.home-footer {
  text-align:center; padding:var(--space-lg);
  padding-bottom:calc(var(--space-lg) + var(--sab));
  font-size:12px; color:var(--text-tertiary); letter-spacing:-.2px;
}

/* ============================================================
   SHARED: BACK BUTTON & INPUT
   ============================================================ */
.back-btn {
  display:inline-flex; align-items:center; gap:var(--space-xs);
  padding:10px 16px 10px 12px;
  border-radius:var(--radius-full);
  background:var(--bg-card); color:var(--text-secondary);
  font-size:15px; font-weight:600;
  border:1px solid var(--border-subtle);
  transition:all var(--duration-fast);
  margin-bottom:var(--space-xl);
}
.back-btn:active { background:var(--bg-card-hover); transform:scale(.97); }
.back-btn .material-symbols-rounded { font-size:20px; }

.step-container {
  flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;
  padding:var(--space-xl) var(--space-xl) calc(var(--space-xl) + var(--sab));
}

.k-input {
  width:100%; padding:14px 16px;
  border-radius:var(--radius-md); border:1.5px solid var(--border-default);
  background:var(--bg-input); color:var(--text-primary);
  font-size:16px!important; font-weight:500; outline:none;
  transition:border-color var(--duration-fast), background var(--duration-fast),
             box-shadow var(--duration-fast);
}
.k-input:focus {
  border-color:var(--accent);
  background:var(--bg-input-focus);
  box-shadow:0 0 0 3px var(--accent-soft);
}
.k-input::placeholder { color:var(--text-tertiary); font-weight:400; }

.k-btn {
  display:inline-flex; align-items:center; justify-content:center;
  gap:var(--space-sm); padding:14px 24px;
  border-radius:var(--radius-md); border:none;
  font-size:15px; font-weight:700; letter-spacing:-.2px;
  transition:all var(--duration-fast) var(--ease-out);
  position:relative; overflow:hidden;
}
.k-btn:active { transform:scale(.97); }
.k-btn:disabled { opacity:.35; cursor:default; pointer-events:none; }
.k-btn-primary {
  background:var(--accent); color:#fff;
  box-shadow:0 2px 8px rgba(255,61,0,.25);
}
.k-btn-primary:active { background:var(--accent-hover); }
.k-btn-secondary {
  background:var(--bg-card); color:var(--text-secondary);
  border:1px solid var(--border-default);
}
.k-btn-block { width:100%; }

/* ============================================================
   REGISTER SCREEN
   ============================================================ */
.reg-info-bar {
  display:flex; gap:var(--space-sm); align-items:center; flex-wrap:wrap;
  padding:var(--space-md) var(--space-lg);
  background:var(--bg-card); border-radius:var(--radius-md);
  margin-bottom:var(--space-xl);
  border:1px solid var(--border-subtle);
}
.reg-info-tag {
  padding:5px 12px; border-radius:var(--radius-full);
  font-size:13px; font-weight:600;
}
.reg-info-tag.dept { background:var(--purple-soft); color:var(--purple); }
.reg-info-tag.guest { background:var(--blue-soft); color:var(--blue); }

.car-input-row {
  display:flex; gap:var(--space-md); margin-bottom:var(--space-xl);
}
.car-input {
  flex:1; padding:20px 16px; border-radius:var(--radius-lg);
  border:2px solid var(--border-default);
  background:var(--bg-input); color:var(--text-primary);
  font-size:32px!important; font-weight:800;
  text-align:center; letter-spacing:4px; outline:none;
  transition:border-color var(--duration-fast), box-shadow var(--duration-fast);
}
.car-input:focus {
  border-color:var(--accent);
  box-shadow:0 0 0 4px var(--accent-soft);
}
.car-search-btn {
  width:72px; border-radius:var(--radius-lg);
  background:var(--accent); color:#fff;
  display:flex; align-items:center; justify-content:center;
  transition:transform var(--duration-fast) var(--ease-spring);
  box-shadow:0 2px 8px rgba(255,61,0,.25);
}
.car-search-btn:active { transform:scale(.92); }
.car-search-btn .material-symbols-rounded { font-size:30px; }

/* Car cards */
.car-results {
  display:none; flex-direction:column; gap:var(--space-md);
  padding:var(--space-sm) 0 var(--space-xl);
}
.car-results.multi {
  flex-direction:row; overflow-x:auto;
  scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch;
}
.car-results.multi::-webkit-scrollbar { display:none; }

.car-card {
  width:100%; background:var(--bg-card);
  border-radius:var(--radius-xl); cursor:pointer;
  border:2px solid transparent;
  transition:all var(--duration-normal) var(--ease-out);
  overflow:hidden; box-shadow:var(--shadow-sm);
}
.car-results.multi .car-card {
  min-width:75%; max-width:85%; flex-shrink:0;
  scroll-snap-align:center;
}
.car-card:active { transform:scale(.98); }
.car-card.selected {
  border-color:var(--accent);
  box-shadow:var(--shadow-glow);
}
.car-card.used { opacity:.4; filter:grayscale(.3); }

.car-card-photo {
  width:100%; display:block;
  object-fit:contain; background:var(--bg-elevated);
}
.car-card-photo.loading {
  display:flex; align-items:center; justify-content:center;
  color:var(--text-tertiary); font-size:12px; min-height:200px;
  background:linear-gradient(90deg,var(--bg-elevated) 25%,var(--bg-card-hover) 50%,var(--bg-elevated) 75%);
  background-size:200% 100%;
  animation:shimmer 1.5s infinite;
}
.car-card-body {
  padding:var(--space-lg) var(--space-xl);
  display:flex; align-items:center; justify-content:space-between;
  gap:var(--space-md);
}
.car-card-left { flex:1; min-width:0; }
.car-card-plate {
  font-size:26px; font-weight:800; letter-spacing:1px; margin-bottom:4px;
}
.car-card-info {
  font-size:14px; color:var(--text-secondary); line-height:1.6; font-weight:500;
}
.car-card-info .entry-time { color:var(--green); font-weight:600; }
.car-card-badges { display:flex; gap:var(--space-sm); flex-wrap:wrap; flex-shrink:0; }
.badge {
  display:inline-flex; align-items:center; gap:3px;
  padding:6px 14px; border-radius:var(--radius-full);
  font-size:13px; font-weight:600;
}
.badge-parking { background:var(--green-soft); color:var(--green); }
.badge-discount { background:var(--yellow-soft); color:var(--yellow); }

.car-card:not(:has(.car-card-photo)) .car-card-body { padding:var(--space-xl); }

/* Memo + Submit */
.reg-memo {
  width:100%; padding:var(--space-lg);
  border-radius:var(--radius-md); border:1.5px solid var(--border-default);
  background:var(--bg-input); color:var(--text-primary);
  font-size:16px!important; font-weight:500;
  outline:none; resize:none; margin-bottom:var(--space-lg);
  transition:border-color var(--duration-fast), box-shadow var(--duration-fast);
}
.reg-memo:focus {
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-soft);
}
.reg-bottom-bar {
  flex-shrink:0;
  padding:var(--space-md) var(--space-xl) calc(var(--space-md) + var(--sab));
  background:var(--bg-base);
  border-top:1px solid var(--border-subtle);
}
.reg-bottom-bar .reg-memo { margin-bottom:var(--space-sm); }
.reg-submit-btn {
  width:100%; padding:20px;
  border-radius:var(--radius-lg);
  background:var(--accent); color:#fff;
  font-size:18px; font-weight:800; letter-spacing:-.3px;
  transition:all var(--duration-fast) var(--ease-spring);
  box-shadow:0 4px 16px rgba(255,61,0,.3);
}
.reg-submit-btn:active { transform:scale(.97); }
.reg-submit-btn:disabled {
  opacity:.25; cursor:default;
  box-shadow:none; transform:none;
}

/* ============================================================
   MODAL — Bottom Sheet
   ============================================================ */
.modal-overlay {
  display:none; position:fixed; inset:0; z-index:20000;
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
  align-items:flex-end; justify-content:center; padding:0;
}
.modal-overlay.show { display:flex; animation:fadeIn .15s; }
.modal-box {
  background:var(--bg-elevated);
  border-radius:var(--radius-2xl) var(--radius-2xl) 0 0;
  padding:var(--space-sm) var(--space-xl) calc(var(--space-xl) + var(--sab));
  width:100%; max-width:500px;
  animation:slideUp var(--duration-normal) var(--ease-out);
}
.modal-handle {
  width:36px; height:4px; border-radius:2px;
  background:var(--text-tertiary);
  margin:var(--space-sm) auto var(--space-xl);
}
.modal-icon-wrap {
  width:56px; height:56px; border-radius:var(--radius-full);
  display:flex; align-items:center; justify-content:center;
  margin:0 auto var(--space-lg);
}
.modal-icon-wrap.success { background:var(--green-soft); color:var(--green); }
.modal-icon-wrap.error   { background:var(--red-soft); color:var(--red); }
.modal-icon-wrap.warn    { background:var(--yellow-soft); color:var(--yellow); }
.modal-icon-wrap.info    { background:var(--blue-soft); color:var(--blue); }
.modal-icon-wrap .material-symbols-rounded { font-size:28px; }
.modal-title {
  font-size:20px; font-weight:800; letter-spacing:-.3px;
  text-align:center; margin-bottom:var(--space-sm);
}
.modal-body {
  font-size:15px; color:var(--text-secondary); line-height:1.7;
  text-align:center; margin-bottom:var(--space-xl); font-weight:500;
}
.modal-actions {
  display:flex; flex-direction:column; gap:var(--space-sm);
}
.modal-actions .modal-btn {
  width:100%; padding:16px; border-radius:var(--radius-md);
  font-size:16px; font-weight:700; letter-spacing:-.2px;
  transition:all var(--duration-fast) var(--ease-spring);
}
.modal-actions .modal-btn:active { transform:scale(.98); }
.modal-actions .modal-btn.primary {
  background:var(--accent); color:#fff;
  box-shadow:0 2px 8px rgba(255,61,0,.2);
}
.modal-actions .modal-btn.secondary {
  background:var(--bg-card); color:var(--text-secondary);
  border:1px solid var(--border-default);
}
.modal-actions.two-buttons { flex-direction:row; }
.modal-actions.two-buttons .modal-btn { flex:1; }

/* ============================================================
   TOAST
   ============================================================ */
.toast-container {
  position:fixed; top:calc(60px + var(--sat));
  left:50%; transform:translateX(-50%);
  z-index:300000; pointer-events:none;
  display:flex; flex-direction:column;
  align-items:center; gap:var(--space-sm);
  width:calc(100% - 32px); max-width:400px;
}
.toast {
  width:100%; padding:var(--space-md) var(--space-lg);
  border-radius:var(--radius-md);
  font-size:14px; font-weight:600;
  opacity:0; transform:translateY(-8px);
  transition:all var(--duration-normal) var(--ease-out);
  pointer-events:auto;
  backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
  border:1px solid var(--border-subtle);
  display:flex; align-items:center; gap:var(--space-sm);
}
.toast.show { opacity:1; transform:translateY(0); }
.toast.success { background:rgba(52,211,153,.1); color:var(--green); border-color:rgba(52,211,153,.15); }
.toast.error   { background:rgba(248,113,113,.1); color:var(--red); border-color:rgba(248,113,113,.15); }
.toast.info    { background:rgba(96,165,250,.1); color:var(--blue); border-color:rgba(96,165,250,.15); }

/* ============================================================
   LOADING SPINNER
   ============================================================ */
.loading-overlay {
  display:none; position:fixed; inset:0; z-index:50000;
  background:rgba(0,0,0,.5);
  backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px);
  align-items:center; justify-content:center;
}
.loading-overlay.show { display:flex; }
.spinner-wrap {
  width:80px; height:80px;
  background:var(--bg-elevated); border-radius:var(--radius-lg);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:var(--space-sm); box-shadow:var(--shadow-lg);
}
.spinner {
  width:32px; height:32px;
  border:3px solid var(--border-default);
  border-top-color:var(--accent);
  border-radius:50%; animation:spin .7s linear infinite;
}

/* ============================================================
   AUTH EXPIRED INDICATOR
   ============================================================ */
.auth-timer {
  font-size:12px; font-weight:500; color:var(--text-tertiary);
  text-align:center; padding:8px 0;
}

/* ============================================================
   STATUS DASHBOARD
   ============================================================ */
.status-top-bar {
  display:flex; align-items:center; gap:var(--space-sm);
  padding:var(--space-md) var(--space-xl);
  flex-shrink:0;
}
.status-icon-btn {
  width:40px; height:40px; border-radius:var(--radius-md);
  background:var(--bg-card); color:var(--text-secondary);
  display:flex; align-items:center; justify-content:center;
  border:1px solid var(--border-subtle);
  transition:all var(--duration-fast);
  flex-shrink:0;
}
.status-icon-btn:active { background:var(--bg-card-hover); transform:scale(.95); }
.status-icon-btn .material-symbols-rounded { font-size:20px; }

.date-nav {
  display:flex; align-items:center; gap:2px;
  margin-left:auto; flex-shrink:0;
}
.date-nav-arrow {
  width:36px; height:36px; border-radius:var(--radius-md);
  background:var(--bg-card); color:var(--text-secondary);
  display:flex; align-items:center; justify-content:center;
  border:1px solid var(--border-subtle);
  transition:all var(--duration-fast);
}
.date-nav-arrow:active { background:var(--bg-card-hover); transform:scale(.93); }
.date-nav-arrow .material-symbols-rounded { font-size:20px; }
.date-nav-label {
  position:relative; padding:10px 18px;
  background:var(--bg-card); color:var(--text-primary);
  border:1px solid var(--border-default); border-radius:var(--radius-md);
  font-size:15px; font-weight:700; white-space:nowrap;
  cursor:pointer; transition:all var(--duration-fast);
  min-width:130px; text-align:center;
}
.date-nav-label:active { background:var(--bg-card-hover); }
.date-nav-label .today-dot {

/* ============================================================
   ★ GUEST 전용: 환경별 자동 스케일링
   ─────────────────────────────────────────────────
   GitHub Pages (직접 호스팅): viewport가 정상 → 스케일 불필요
   GAS iframe: viewport 무시됨 → JS가 .gas-mode 클래스 추가 → 2x
   ============================================================ */

* { touch-action:manipulation; -webkit-tap-highlight-color:transparent; }
html, body {
  height:100vh!important; height:100dvh!important;
  overscroll-behavior:none;
  -webkit-touch-callout:none;
  -webkit-text-size-adjust:100%;
  text-size-adjust:100%;
  overflow:hidden!important;
}

/* ── GAS 배너 강제 숨김 (GAS에서 열릴 경우 대비) ── */
body > *:not(#app):not(script):not(style):not(link):not(noscript) {
  display:none!important;
  height:0!important; width:0!important;
  overflow:hidden!important;
  opacity:0!important;
  pointer-events:none!important;
  position:absolute!important;
}

/* ── 기본: GitHub Pages / 직접 호스팅 (스케일 없음, 풀스크린) ── */
#app {
  width:100vw; height:100vh; height:100dvh;
  -webkit-text-size-adjust:100%; text-size-adjust:100%;
  display:flex; flex-direction:column;
  overflow:hidden; position:relative;
  padding-top:var(--sat);
}

/* ── GAS iframe 모드: JS가 감지 시 .gas-mode 추가 → 2x 확대 ── */
#app.gas-mode {
  width:50vw; height:50vh; height:50dvh;
  -webkit-transform:scale(2); transform:scale(2);
  -webkit-transform-origin:top left; transform-origin:top left;
}

   GitHub Pages에서는 일반 모바일 앱 기준으로 축소 조정

<!-- ★ GAS API Bridge: GAS iframe 밖에서도 google.script.run 호환 동작 -->
<script>
(function() {
  // GAS iframe 안에서 실행 중이면 → 이미 google.script.run 존재 → 아무것도 안 함
  try {
    if (typeof google !== 'undefined' && google.script && google.script.run) return;
  } catch(e) {}

  // ── 외부 호스팅 모드: fetch()로 GAS API 호출 ──
  var GAS_API = 'https://script.google.com/macros/s/AKfycbwSjDs_TaDa_TEZrqk4DlcF6N6MLu2CIdGVEfPUZdrtMzy4n4sd9rFqrDAKZi1vpReb/exec';

  function Runner() {
    this._ok = function(){};
    this._fail = function(e){ console.error('GAS API:', e); };
  }
  Runner.prototype.withSuccessHandler = function(fn) {
    var r = new Runner(); r._ok = fn || function(){}; r._fail = this._fail; return r;
  };
  Runner.prototype.withFailureHandler = function(fn) {
    var r = new Runner(); r._ok = this._ok; r._fail = fn || function(){}; return r;
  };

  var FN_NAMES = [
    'guestSendSms','guestVerifySms','guestCheckAuth',
    'uspaceSearchCars','uspaceGetPhoto','recordToSheet',
    'uspaceRegisterDiscountBatch','getSheetPayTypes',
    'uspaceGetStatus','uspaceDeleteDiscount',
    'deleteFromSheet','deleteAllFromSheet',
    'uspaceDeleteDiscountBatch','checkLoginStatus','uspaceGetBalance','getAppVersion','getEmployeeCarNumbers'
  ];

  FN_NAMES.forEach(function(name) {
    Runner.prototype[name] = function() {
      var args = Array.prototype.slice.call(arguments);
      var onOk = this._ok, onFail = this._fail;
      var url = GAS_API + '?fn=' + encodeURIComponent(name) +
                '&args=' + encodeURIComponent(JSON.stringify(args)) +
                '&_=' + Date.now();
      fetch(url, { redirect:'follow', cache:'no-store' })
        .then(function(r) {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.text();
        })
        .then(function(txt) {
          try { onOk(JSON.parse(txt)); }
          catch(e) { onFail({ message: 'Invalid server response' }); }
        })
        .catch(function(err) {
          onFail({ message: err.message || 'Network error' });
        });
    };
  });

  window.google = { script: { run: new Runner() } };
  console.log('[GAS Bridge] 외부 호스팅 모드 활성화');
})();
</script>

(function detectEnvironment() {
  var isInsideIframe = false;

  // 전역 플래그 설정 (protectScale 등에서 참조)

      if (app) app.classList.add('gas-mode');

  } else {
    console.log('[Env] GitHub Pages 직접 호스팅 모드 (1x, 풀스크린)');

})();

<script>
/* ============================================================
   iOS 확대 완전 차단 (PASS 앱처럼 화면 고정)
   ============================================================ */
(function() {
  // 1) 핀치 줌 차단
  document.addEventListener('gesturestart', function(e) { e.preventDefault(); }, { passive: false });
  document.addEventListener('gesturechange', function(e) { e.preventDefault(); }, { passive: false });
  document.addEventListener('gestureend', function(e) { e.preventDefault(); }, { passive: false });

  // 2) 더블탭 줌 차단
  var lastTouchEnd = 0;
  document.addEventListener('touchend', function(e) {
    var now = Date.now();
    if (now - lastTouchEnd <= 300) { e.preventDefault(); }
    lastTouchEnd = now;
  }, { passive: false });

  // 3) 입력 필드 포커스 시 자동 확대 차단
  //    viewport를 강제로 리셋해서 확대를 원천 봉쇄
  var vpMeta = document.querySelector('meta[name="viewport"]');
  var vpContent = 'width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover';
  function lockViewport() { vpMeta.setAttribute('content', vpContent); }
  lockViewport();
  document.addEventListener('focus', function(e) {
    var tag = e.target.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') {
      lockViewport();
      // 살짝 딜레이 후 한번 더 (iOS가 포커스 시점에 확대 시도하므로)
      setTimeout(lockViewport, 100);
      setTimeout(lockViewport, 300);
    }
  }, true);
  document.addEventListener('blur', function(e) {
    var tag = e.target.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') {
      lockViewport();
    }
  }, true);
})();

/* ============================================================
   STATE
   ============================================================ */
var AUTH_STORAGE_KEY = 'guest_auth_phone';       // localStorage 키
var AUTH_TS_KEY      = 'guest_auth_timestamp';   // 마지막 인증 성공 시각
var AUTH_CACHE_MS    = 24 * 60 * 60 * 1000;      // 24시간 캐시
var authedPhone = '';  // 인증된 전화번호

var selectedMember = { dept: 'HR', name: 'HR' };
var isGuest = true;
var carResults = [];
var selectedCar = null;

var appliedDiscounts = {};
var knownDiscountCounts = {};

/* ============================================================
   DISCOUNT BUSINESS LOGIC (from employee version)
   ============================================================ */
var EXIT_BUFFER = 10;
var WEEKEND_FREE_MIN = 600; // 10hr free on weekends

function isWeekend(entryDateStr) {
  if (entryDateStr && entryDateStr.length >= 8) {
    var clean = entryDateStr.replace(/\D/g, '');
    var y = parseInt(clean.substring(0, 4), 10);
    var mo = parseInt(clean.substring(4, 6), 10) - 1;
    var d = parseInt(clean.substring(6, 8), 10);
    var entryDay = new Date(y, mo, d).getDay();
    return entryDay === 0 || entryDay === 6;
  }
  var day = new Date().getDay();
  return day === 0 || day === 6;
}

var DSCNT_NAMES = {
  '1': '기본 2시간 할인', '11': '기본 6시간 할인',
  '2': '30분 할인', '3': '1시간 할인', '5': '2시간 할인'
};
var DSCNT_COVER_MIN = {
  '1': 120, '11': 360, '2': 30, '3': 60, '5': 120
};

function getBaseDiscount(entryDateStr) {
  if (entryDateStr && entryDateStr.length >= 13) {
    var clean = entryDateStr.replace(/\D/g, '');
    if (clean.length >= 12) {
      var hh = parseInt(clean.substring(8, 10), 10);
      var mm = parseInt(clean.substring(10, 12), 10);
      if (hh * 60 + mm >= 1050) { // 17:30
        return { baseId: '11', baseFreeMin: 360 };
      }
    }
  }
  return { baseId: '1', baseFreeMin: 120 };
}

function calcDiscount(incarMin, baseFreeMin) {
  var totalMin = incarMin + EXIT_BUFFER;
  var thd = 1;
  var hd = 0;
  var md = 0;
  var remain = totalMin - baseFreeMin;
  if (remain > 0) {
    hd = Math.floor(remain / 60);
    var leftover = remain % 60;
    if (leftover > 0) {
      if (leftover > 30) { hd++; } else { md = 1; }
    }
  }
  return { thd: thd, hd: hd, md: md };
}

/* ============================================================
   PHONE AUTH
   ============================================================ */
function formatPhone(input) {
  var v = input.value.replace(/[^0-9]/g, '');
  if (v.length > 11) v = v.substring(0, 11);
  if (v.length > 7) {
    input.value = v.substring(0,3) + '-' + v.substring(3,7) + '-' + v.substring(7);
  } else if (v.length > 3) {
    input.value = v.substring(0,3) + '-' + v.substring(3);
  } else {
    input.value = v;
  }
}

function setPhoneStatus(msg, cls) {
  var el = document.getElementById('phoneStatus');
  el.textContent = msg;
  el.className = 'phone-status' + (cls ? ' ' + cls : '');
}

function sendSmsCode() {
  var phone = document.getElementById('phoneInput').value.trim();
  if (!/^010-\d{4}-\d{4}$/.test(phone)) {
    setPhoneStatus('올바른 휴대폰 번호를 입력해주세요', 'err');
    return;
  }

  showLoading(true, '인증코드 발송 중...');
  document.getElementById('sendCodeBtn').disabled = true;

  google.script.run
    .withSuccessHandler(function(res) {
      showLoading(false);
      document.getElementById('sendCodeBtn').disabled = false;
      if (res && res.sent) {
        setPhoneStatus('인증코드가 발송되었습니다', 'ok');
        document.getElementById('codeSection').classList.add('show');
        setTimeout(function() { document.getElementById('codeInput').focus(); }, 200);
      } else {
        setPhoneStatus(res.msg || '발송 실패', 'err');
      }
    })
    .withFailureHandler(function(err) {
      showLoading(false);
      document.getElementById('sendCodeBtn').disabled = false;
      setPhoneStatus('오류: ' + err.message, 'err');
    })
    .guestSendSms(phone);
}

function verifySmsCode() {
  var phone = document.getElementById('phoneInput').value.trim();
  var code = document.getElementById('codeInput').value.trim();
  if (!code || code.length < 4) {
    setPhoneStatus('인증코드를 입력해주세요', 'err');
    return;
  }

  showLoading(true, '인증 확인 중...');

  google.script.run
    .withSuccessHandler(function(res) {
      showLoading(false);
      if (res && res.verified) {
        setPhoneStatus('인증 성공!', 'ok');
        // ★ localStorage에 영구 저장 + 인증 시각 기록
        authedPhone = phone;
        try {
          localStorage.setItem(AUTH_STORAGE_KEY, phone);
          localStorage.setItem(AUTH_TS_KEY, String(Date.now()));
        } catch(e) {}
        setTimeout(function() { showScreen('homeScreen'); }, 500);
        setTimeout(function() { loadBalance(); }, 1000); // ★ 잔액 프리로드
        setTimeout(function() { loadEmployeeCarNumbers(); }, 1200); // ★ 자차목록 프리로드
      } else {
        setPhoneStatus(res.msg || '인증 실패', 'err');
      }
    })
    .withFailureHandler(function(err) {
      showLoading(false);
      setPhoneStatus('오류: ' + err.message, 'err');
    })
    .guestVerifySms(phone, code);
}

function checkAuthExpired() {
  // localStorage에 저장된 번호가 없으면 인증 만료
  if (!authedPhone) {
    showModal('warn', '인증 필요',
      '본인인증이 필요합니다.',
      [{ text: '인증 화면으로', cls: 'primary', action: function() { closeModal(); resetToPhone(); }}]
    );
    return true;
  }
  return false;
}

function resetToPhone() {
  document.getElementById('phoneInput').value = '';
  document.getElementById('codeInput').value = '';
  document.getElementById('codeSection').classList.remove('show');
  setPhoneStatus('', '');
  showScreen('phoneScreen');
}

/**
 * 관리자가 시트에서 삭제했는지 확인 (앱 사용 중 주기적 체크 가능)
 */
function recheckAuth() {
  if (!authedPhone) return;
  google.script.run
    .withSuccessHandler(function(res) {
      if (res && !res.authorized) {
        // 권한 삭제됨 → 차단
        try {
          localStorage.removeItem(AUTH_STORAGE_KEY);
          localStorage.removeItem(AUTH_TS_KEY);
        } catch(e) {}
        authedPhone = '';
        showModal('warn', '접근 차단',
          '관리자에 의해 권한이 제거되었습니다.<br>더 이상 이 앱을 사용할 수 없습니다.',
          [{ text: '확인', cls: 'primary', action: function() { closeModal(); resetToPhone(); }}]
        );
      }
    })
    .withFailureHandler(function() { /* 네트워크 오류 시 무시 */ })
    .guestCheckAuth(authedPhone);
}

   HELP MODAL

   ============================================================ */
function showScreen(id) {
  var screens = document.querySelectorAll('.screen');

  document.getElementById(id).classList.add('active');

function goHome() {
  resetRegister();
  showScreen('homeScreen');

  var timerEl = document.getElementById('authTimer');
  if (timerEl && authedPhone) {
    timerEl.textContent = '인증됨: ' + authedPhone;

  if (checkAuthExpired()) return;
  resetRegister();
  showScreen('regScreen');

function resetRegister() {
  selectedCar = null;
  carResults = [];
  document.getElementById('carNoInput').value = '';
  document.getElementById('memoInput').value = '';

/* ============================================================
   CAR SEARCH
   ============================================================ */
function onCarInput(input) {
  input.value = input.value.replace(/[^0-9]/g, '');
  if (input.value.length >= 4) searchCar();
}

function searchCar() {
  if (checkAuthExpired()) return;
  var q = document.getElementById('carNoInput').value.trim();
  if (q.length < 2) { toast('차량번호 2자리 이상 입력해주세요', 'error'); return; }

  showLoading(true);
  google.script.run
    .withSuccessHandler(function(res) {
      showLoading(false);
      if (!res.ok) {
        toast(res.msg || '검색 실패', 'error');
        return;
      }
      carResults = res.data || [];
      renderCarResults(q);
    })
    .withFailureHandler(function(err) {
      showLoading(false);
      toast('검색 오류: ' + err.message, 'error');
    })
    .uspaceSearchCars(q, '1A-605', todayStr8());
}

function renderCarResults(query) {
  var container = document.getElementById('carResults');
  selectedCar = null;
  document.getElementById('regSubmitBtn').disabled = true;

  if (carResults.length === 0) {
    container.innerHTML = '<div style="padding:24px;color:var(--text-tertiary);font-size:14px;font-weight:500;text-align:center;width:100%">' +
                          '검색 결과가 없습니다</div>';
    container.style.display = 'flex';
    return;
  }

  var html = '';
  var lastDiscountCnt = 0;
  for (var i = 0; i < carResults.length; i++) {
    var r = carResults[i];
    var plate = r.carNo || '';
    var entryStr = r.entryDateToString || '';
    var entryTime = entryStr.length >= 16 ? entryStr.substring(11, 16) : entryStr;
    var parkMin = r.incar_min || 0;
    var parkDisplay = parkMin >= 60
      ? Math.floor(parkMin / 60) + '시간 ' + (parkMin % 60) + '분'
      : parkMin + '분';
    var discountCnt = Number(r.dscnt_cnt || 0);
    lastDiscountCnt = discountCnt;
    var hasDiscount = discountCnt > 0;
    var hasPic = r.acEntrancePicName && r.acEntrancePicName.length > 3;

    html += '<div class="car-card' + (hasDiscount ? ' used' : '') + '" onclick="selectCar(' + i + ')" data-idx="' + i + '">';

    if (hasPic) {
      html += '<div class="car-card-photo loading" id="carPhoto' + i + '"></div>';
    }

    html += '<div class="car-card-body">' +
            '<div class="car-card-left">' +
            '<div class="car-card-plate">' + esc(plate) + '</div>' +
            '<div class="car-card-info">' +
            '<span class="entry-time">입차 ' + esc(entryTime) + '</span> · 주차 ' + esc(parkDisplay) +
            '</div></div>' +
            '<div class="car-card-badges">' +
            '<span class="badge badge-parking">주차중</span>';
    if (hasDiscount) {
      html += '<span class="badge badge-discount">할인 ' + discountCnt + '건</span>';
    }
    html += '</div></div></div>';
  }

  container.innerHTML = html;
  container.style.display = 'flex';

  if (carResults.length > 1) {
    container.classList.add('multi');
  } else {
    container.classList.remove('multi');
  }

  for (var j = 0; j < carResults.length; j++) {
    if (carResults[j].acEntrancePicName) loadCarPhoto(j, carResults[j].acEntrancePicName);
  }

  if (carResults.length === 1 && lastDiscountCnt === 0) selectCar(0);
}

function loadCarPhoto(idx, picPath) {
  google.script.run
    .withSuccessHandler(function(res) {
      var el = document.getElementById('carPhoto' + idx);
      if (!el) return;
      if (res && res.ok && res.dataUrl) {
        var img = document.createElement('img');
        img.className = 'car-card-photo';
        img.src = res.dataUrl;
        img.alt = '입차 사진';
        img.onerror = function() { el.textContent = '사진 없음'; };
        el.replaceWith(img);
      } else {
        el.textContent = '사진 없음';
        el.classList.remove('loading');
      }
    })
    .withFailureHandler(function() {
      var el = document.getElementById('carPhoto' + idx);
      if (el) { el.textContent = ''; el.classList.remove('loading'); }
    })
    .uspaceGetPhoto(picPath);
}

function selectCar(idx) {
  selectedCar = carResults[idx];
  document.getElementById('regSubmitBtn').disabled = false;

  var cards = document.querySelectorAll('.car-card');
  for (var i = 0; i < cards.length; i++) cards[i].classList.remove('selected');
  cards[idx].classList.add('selected');

  var plate = selectedCar.carNo || '';
  var serverCnt = Number(selectedCar.dscnt_cnt || 0);
  var entryKey = plate + '_' + (selectedCar.entryDateToString || '').replace(/\D/g, '');
  var myData = appliedDiscounts[entryKey];
  var myCnt = knownDiscountCounts[plate] || 0;

  if (serverCnt > 0 && !myData && myCnt === 0) {
    toast('이 차량은 이미 할인 ' + serverCnt + '건이 적용되어 있습니다', 'info');
  }
}

/* ============================================================
   DISCOUNT REGISTRATION
   ============================================================ */
function submitRegistration() {
  if (!selectedCar) return;
  if (checkAuthExpired()) return;

  // ★ 메모 필수 체크
  var memoVal = document.getElementById('memoInput').value.trim();
  if (!memoVal) {
    toast('메모를 입력해주세요 (ex. TA-인터뷰 OOO님)', 'error');
    document.getElementById('memoInput').focus();
    return;
  }

  // ★ v2.7 자차 리베이트 방지 — 구성원 차량 차단
  var regCarNo = String(selectedCar.carNo || '').replace(/\s/g, '');
  if (isEmployeeCar(regCarNo)) {
    showModal('warn', '등록 불가',
      '<div style="line-height:1.8;text-align:center;padding:8px 0">' +
      '<div style="font-size:40px;margin-bottom:12px">🚫</div>' +
      '<div style="font-size:15px;font-weight:700;color:var(--red);margin-bottom:8px">' +
      '등록이 제한된 차량입니다</div>' +
      '<div style="font-size:14px;color:var(--text-secondary);margin-bottom:12px">' +
      '자차 또는 외부업체 차량은<br>' +
      '<b>손님용 할인 등록이 불가합니다</b></div>' +
      '<div style="background:var(--red-soft);border-radius:var(--radius-md);padding:10px;font-size:13px;color:var(--red)">' +
      '차량: <b>' + esc(regCarNo) + '</b></div>' +
      '</div>',
      [{ text: '확인', cls: 'primary', action: closeModal }]
    );
    return;
  }

  // ★ 자차목록 미로드 상태에서 시도 시 실시간 체크
  if (!_empCarLoaded) {
    showLoading(true, '차량 확인 중...');
    google.script.run
      .withSuccessHandler(function(list) {
        showLoading(false);
        if (Array.isArray(list)) {
          _employeeCarNumbers = list.map(function(n) { return String(n).replace(/\s/g, ''); });
          _empCarLoaded = true;
        }
        if (isEmployeeCar(regCarNo)) {
          showModal('warn', '등록 불가',
            '<div style="line-height:1.8;text-align:center;padding:8px 0">' +
            '<div style="font-size:40px;margin-bottom:12px">🚫</div>' +
            '<div style="font-size:15px;font-weight:700;color:var(--red);margin-bottom:8px">' +
            '등록이 제한된 차량입니다</div>' +
            '<div style="font-size:14px;color:var(--text-secondary);margin-bottom:12px">' +
            '자차 또는 외부업체 차량은<br>' +
            '<b>손님용 할인 등록이 불가합니다</b></div>' +
            '<div style="background:var(--red-soft);border-radius:var(--radius-md);padding:10px;font-size:13px;color:var(--red)">' +
            '차량: <b>' + esc(regCarNo) + '</b></div>' +
            '</div>',
            [{ text: '확인', cls: 'primary', action: closeModal }]
          );
          return;
        }
        // 통과 → 원래 등록 로직 재실행
        submitRegistration();
      })
      .withFailureHandler(function(err) {
        showLoading(false);
        // 목록 조회 실패 시 → 등록은 진행 (안전장치 실패해도 서비스 중단 방지)
        console.error('자차목록 실시간 조회 실패:', err);
        _empCarLoaded = true; // 재시도 방지
        submitRegistration();
      })
      .getEmployeeCarNumbers();
    return;
  }

  var carId = selectedCar.id || '';
  if (!carId) { toast('차량 식별정보 없음', 'error'); return; }

  var incarMin = selectedCar.incar_min || 0;
  var carNo = selectedCar.carNo || '';
  var entryKey = carNo + '_' + (selectedCar.entryDateToString || '').replace(/\D/g, '');
  var entryDateRaw = selectedCar.entryDateToString || '';

  // Weekend logic
  if (isWeekend(entryDateRaw)) {
    var weekendMemo = document.getElementById('memoInput').value.trim();
    var safeRemain = WEEKEND_FREE_MIN - (incarMin + EXIT_BUFFER);

    if (safeRemain >= 0) {
      // Under 10hr — no discount needed
      showModal('success', '주말 무료 주차',
        '<div style="line-height:1.9">' +
        '차량: <b>' + esc(carNo) + '</b><br>' +
        '주차시간: <b>' + formatMinutes(incarMin) + '</b><br>' +
        '<div style="background:var(--green-soft);border-radius:var(--radius-md);padding:12px;margin-top:8px">' +
        '<span style="color:var(--green);font-weight:800">주말 10시간 기본무료 적용 중</span><br>' +
        '<span style="color:var(--green);font-size:13px">남은 무료 시간: <b>' + formatMinutes(safeRemain) + '</b></span>' +
        '</div></div>',
        [{ text: '확인', cls: 'primary', action: function() { closeModal(); goHome(); }}]
      );

      google.script.run
        .withSuccessHandler(function() {})
        .withFailureHandler(function() {})
        .recordToSheet({
          action: 'new', name: 'HR', number: carNo, dept: 'HR',
          memo: weekendMemo || '주말 10시간 무료',
          isGuest: true, thd: 0, hd: 0, md: 0, payType: '손님용'
        });
      return;
    }

    // Over 10hr — calculate excess
    var excessMin = incarMin + EXIT_BUFFER - WEEKEND_FREE_MIN;
    var exHd = Math.floor(excessMin / 60);
    var exLeftover = excessMin % 60;
    var exMd = 0;
    if (exLeftover > 0) {
      if (exLeftover > 30) { exHd++; } else { exMd = 1; }
    }
    var weekendTypes = [];
    for (var wi = 0; wi < exHd; wi++) weekendTypes.push('3');
    for (var wi2 = 0; wi2 < exMd; wi2++) weekendTypes.push('2');
    var weekendBase = getBaseDiscount(entryDateRaw);
    var weekendCalc = { thd: 0, hd: exHd, md: exMd };
    var weekendDiscountSummary = weekendTypes.map(function(t) { return DSCNT_NAMES[t] || t; }).join(', ');
    var weekendCost = (exHd * 1500) + (exMd * 750);

    showModal('info', '주말 초과 주차 할인',
      '<div style="line-height:1.9;text-align:left">' +
      '차량: <b>' + esc(carNo) + '</b><br>' +
      '주차시간: <b>' + formatMinutes(incarMin) + '</b><br>' +
      '<div style="background:var(--blue-soft);border-radius:var(--radius-md);padding:10px;margin-top:8px;font-size:13px">' +
      '주말 <b>10시간 기본무료는 유지</b>됩니다.<br>' +
      '초과분 <b>' + formatMinutes(excessMin) + '</b>에 대해서만 유료 할인권을 등록합니다.' +
      '</div><br>' +
      '할인권: <b>' + weekendTypes.length + '장</b> (' + esc(weekendDiscountSummary) + ')<br>' +
      (weekendCost > 0 ? '공제금액: <b style="color:var(--red)">' + weekendCost.toLocaleString() + '원</b>' : '') +
      '</div>',
      [
        { text: '등록', cls: 'primary', action: function() {
          closeModal();
          applyDiscountsBatch(carId, weekendTypes, weekendCalc, weekendBase, entryKey);
        }},
        { text: '취소', cls: 'secondary', action: closeModal }
      ]
    );
    return;
  }

  // Weekday logic
  var prevData = appliedDiscounts[entryKey];
  var base = getBaseDiscount(entryDateRaw);

  if (prevData) {
    var prevCoverMin = prevData.coverMin || 0;
    var totalNeeded = incarMin + EXIT_BUFFER;
    var additionalNeeded = totalNeeded - prevCoverMin;

    if (additionalNeeded <= 0) {
      var remMin = prevCoverMin - incarMin;
      showModal('info', '추가 등록 불필요',
        '이미 할인이 적용되어 있습니다.<br>남은 출차 시간: <b>' + formatMinutes(remMin) + '</b>',
        [
          { text: '확인', cls: 'primary', action: closeModal },
          { text: '30분 추가', cls: 'secondary', action: function() {
            closeModal();
            applyDiscountsBatch(carId, ['2'], { thd:0, hd:0, md:1 }, base, entryKey);
          }},
          { text: '1시간 추가', cls: 'secondary', action: function() {
            closeModal();
            applyDiscountsBatch(carId, ['3'], { thd:0, hd:1, md:0 }, base, entryKey);
          }}
        ]
      );
      return;
    }

    var addHd = Math.floor(additionalNeeded / 60);
    var addLeftover = additionalNeeded % 60;
    var addMd = 0;
    if (addLeftover > 0) {
      if (addLeftover > 30) { addHd++; } else { addMd = 1; }
    }

    var addCalc = { thd: 0, hd: addHd, md: addMd };
    var addTypes = [];
    for (var ai = 0; ai < addCalc.hd; ai++) addTypes.push('3');
    for (var ai2 = 0; ai2 < addCalc.md; ai2++) addTypes.push('2');

    if (addTypes.length === 0) { toast('추가 할인 불필요', 'info'); return; }

    showModal('info', '추가 할인권 등록',
      '<div style="line-height:1.9;text-align:left">' +
      '차량: <b>' + esc(carNo) + '</b><br>' +
      '주차시간: <b>' + formatMinutes(incarMin) + '</b><br>' +
      '기존 할인: <b>' + formatMinutes(prevCoverMin) + '</b> 커버 중<br>' +
      '추가 필요: <b>' + formatMinutes(additionalNeeded) + '</b><br>' +
      '추가 할인권: <b>' + addTypes.length + '장</b>' +
      '</div>',
      [
        { text: '등록', cls: 'primary', action: function() {
          closeModal();
          applyDiscountsBatch(carId, addTypes, addCalc, base, entryKey);
        }},
        { text: '취소', cls: 'secondary', action: closeModal }
      ]
    );
    return;
  }

  // First-time registration
  var calc = calcDiscount(incarMin, base.baseFreeMin);
  var discountTypes = [base.baseId];
  for (var i = 0; i < calc.hd; i++) discountTypes.push('3');
  for (var i2 = 0; i2 < calc.md; i2++) discountTypes.push('2');

  var totalCost = (calc.hd * 1500) + (calc.md * 750);
  var parkTimeStr = formatMinutes(incarMin);
  var discountSummary = discountTypes.map(function(t) { return DSCNT_NAMES[t] || t; }).join(', ');

  showModal('info', '할인권 등록 확인',
    '<div style="line-height:1.9;text-align:left">' +
    '차량: <b>' + esc(carNo) + '</b><br>' +
    '주차시간: <b>' + parkTimeStr + '</b><br>' +
    '할인권: <b>' + discountTypes.length + '장</b><br>' +
    '<span style="font-size:12px;color:var(--text-tertiary)">' + esc(discountSummary) + '</span><br>' +
    (totalCost > 0 ? '공제금액: <b style="color:var(--red)">' + totalCost.toLocaleString() + '원</b>' : '') +
    '</div>',
    [
      { text: '등록', cls: 'primary', action: function() {
        closeModal();
        applyDiscountsBatch(carId, discountTypes, calc, base, entryKey);
      }},
      { text: '취소', cls: 'secondary', action: closeModal }
    ]
  );
}

function applyDiscountsBatch(carId, types, calc, base, entryKey) {
  if (checkAuthExpired()) return;

  showLoading(true, '할인 ' + types.length + '건 등록중...');
  document.getElementById('regSubmitBtn').disabled = true;

  google.script.run
    .withSuccessHandler(function(res) {
      showLoading(false);
      if (!res.ok && !res.results) {
        toast('등록 실패: ' + (res.msg || ''), 'error');
        document.getElementById('regSubmitBtn').disabled = false;
        return;
      }

      var failTypes = [];
      if (res.results) {
        for (var i = 0; i < res.results.length; i++) {
          var r = res.results[i];
          if (r.fallback) {
            // ★ 재입차: 기본할인 → 동일 시간 유료로 대체됨
            calc.thd = 0;
            var extraHd = r.extraHd || 2;
            calc.hd += extraHd;
            // ★ types 배열도 수정 → finishRegistration에서 thd 재계산 시 올바르게 0
            var fbNewTypes = [];
            for (var fi = 0; fi < types.length; fi++) {
              if (types[fi] === '1') {
                fbNewTypes.push('3'); fbNewTypes.push('3');
              } else if (types[fi] === '11') {
                for (var fx = 0; fx < 6; fx++) fbNewTypes.push('3');
              } else {
                fbNewTypes.push(types[fi]);
              }
            }
            types.length = 0;
            for (var fj = 0; fj < fbNewTypes.length; fj++) types.push(fbNewTypes[fj]);
            toast('재입차: 무료할인 → ' + extraHd + '시간 유료로 대체', 'info');
          } else if (!r.ok) {
            var failLabel = (DSCNT_NAMES[r.type] || r.type) + (r.msg ? '(' + r.msg + ')' : '');
            failTypes.push(failLabel);
            if (r.isBusinessError && (r.type === '1' || r.type === '11')) {
              calc.thd = 0;
            }
          }
        }
      }
      if (failTypes.length > 0) {
        toast(failTypes.join(', ') + ' 실패', 'error');
      }
      finishRegistration(calc.hd, calc.md, base, types, entryKey);
    })
    .withFailureHandler(function(err) {
      showLoading(false);
      toast('오류: ' + err.message, 'error');
      document.getElementById('regSubmitBtn').disabled = false;
    })
    .uspaceRegisterDiscountBatch(carId, types, '1A-605');
}

function finishRegistration(hd, md, base, types, entryKey) {
  showLoading(false);
  closeModal();

  // Invalidate status cache so next visit to 등록현황 shows fresh data
  _statusCache.time = 0;

  var payType = '손님용';
  var plate = selectedCar ? (selectedCar.carNo || '') : '';
  var memo = document.getElementById('memoInput').value.trim();

  var thd = 0;
  if (types) {
    for (var ti = 0; ti < types.length; ti++) {
      if (types[ti] === '1' || types[ti] === '11') { thd = 1; break; }
    }
  }
  var incarMin = selectedCar ? (selectedCar.incar_min || 0) : 0;
  var baseFreeMin = base ? base.baseFreeMin : 120;

  var prevCover = appliedDiscounts[entryKey];
  var prevCoverMin = prevCover ? (prevCover.coverMin || 0) : 0;
  var thisCoverMin = (thd * baseFreeMin) + (hd * 60) + (md * 30);
  var weekendBonus = 0;
  if (isWeekend(selectedCar ? selectedCar.entryDateToString : '') && prevCoverMin === 0 && thd === 0) {
    weekendBonus = WEEKEND_FREE_MIN;
  }
  var coverMin = prevCoverMin + thisCoverMin + weekendBonus;
  var remainMin = coverMin - incarMin;
  var remainStr = formatMinutes(Math.max(0, remainMin));

  if (entryKey) {
    appliedDiscounts[entryKey] = {
      coverMin: coverMin,
      name: 'HR', dept: 'HR', isGuest: true
    };
  }
  if (plate && types) {
    var prevKnown = knownDiscountCounts[plate] || (Number(selectedCar.dscnt_cnt) || 0);
    knownDiscountCounts[plate] = prevKnown + types.length;
  }

  // Sheet recording (fire-and-forget)
  google.script.run
    .withSuccessHandler(function(res) {
      if (res && res.error) toast('시트 기록 참고: ' + res.error, 'info');
    })
    .withFailureHandler(function() {
      toast('시트 기록 실패 (할인은 정상)', 'info');
    })
    .recordToSheet({
      action: prevCover ? 'update' : 'new',
      name: 'HR', number: plate, dept: 'HR',
      memo: memo, isGuest: true,
      thd: thd, hd: hd, md: md,
      payType: payType
    });

  // Type count summary
  var typeCounts = {};
  (types || []).forEach(function(t) { typeCounts[t] = (typeCounts[t] || 0) + 1; });
  var discountDetail = Object.keys(typeCounts).map(function(t) {
    return (DSCNT_NAMES[t] || t) + (typeCounts[t] > 1 ? ' ×' + typeCounts[t] : '');
  }).join(', ');

  // Save context for extra discount
  window._lastRegCtx = {
    carId: selectedCar ? (selectedCar.id || '') : '',
    plate: plate,
    entryKey: entryKey,
    coverMin: coverMin,
    incarMin: incarMin
  };

  // ★ 등록 완료 → 잔액 갱신
  setTimeout(function() { loadBalance(); }, 1500);

  showModal('success', '등록 완료',
    '<div style="line-height:2">' +
    '차량 <b style="font-size:18px;letter-spacing:1px">' + esc(plate) + '</b><br>' +
    '<span style="font-size:14px;color:var(--blue);font-weight:600">' + esc(discountDetail) + '</span>' +
    '<div id="extraRemainBox" style="background:var(--green-soft);border-radius:var(--radius-md);padding:14px;margin-top:14px">' +
    '<span style="color:var(--green);font-weight:800;font-size:17px">남은 출차 시간: ' + remainStr + '</span>' +
    '</div>' +
    '<div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border-subtle)">' +
    '<div style="font-size:13px;color:var(--text-secondary);margin-bottom:10px;font-weight:600">추가 할인 등록</div>' +
    '<div style="display:flex;gap:8px">' +
    '<button onclick="addExtraDiscount(\'2\',30)" class="extra-dc-btn" style="flex:1;border:1.5px solid var(--blue);background:var(--blue-soft);color:var(--blue);border-radius:var(--radius-md);padding:10px 0;font-size:14px;font-weight:700;cursor:pointer">+30분</button>' +
    '<button onclick="addExtraDiscount(\'3\',60)" class="extra-dc-btn" style="flex:1;border:1.5px solid var(--green);background:var(--green-soft);color:var(--green);border-radius:var(--radius-md);padding:10px 0;font-size:14px;font-weight:700;cursor:pointer">+1시간</button>' +
    '</div></div></div>',
    [{ text: '확인', cls: 'primary', action: function() { closeModal(); goHome(); }}]
  );
  document.getElementById('regSubmitBtn').disabled = false;
}

function addExtraDiscount(typeId, addMin) {
  if (checkAuthExpired()) return;
  var ctx = window._lastRegCtx;
  if (!ctx || !ctx.carId) { toast('차량 정보가 없습니다. 다시 등록해주세요.', 'error'); return; }

  var btns = document.querySelectorAll('.extra-dc-btn');
  btns.forEach(function(b) { b.disabled = true; b.style.opacity = '0.5'; });

  var typeName = DSCNT_NAMES[typeId] || typeId;
  toast(typeName + ' 추가 등록중...', 'info');

  google.script.run
    .withSuccessHandler(function(res) {
      btns.forEach(function(b) { b.disabled = false; b.style.opacity = '1'; });

      if (!res.ok && !res.results) {
        toast('추가 등록 실패: ' + (res.msg || ''), 'error');
        return;
      }
      var hasFail = false;
      if (res.results) {
        for (var i = 0; i < res.results.length; i++) {
          if (!res.results[i].ok) { hasFail = true; toast(typeName + ' 추가 실패: ' + (res.results[i].msg || ''), 'error'); }
        }
      }
      if (hasFail) return;

      toast(typeName + ' 추가 완료!', 'success');

      ctx.coverMin += addMin;
      var newRemain = ctx.coverMin - ctx.incarMin;
      var remainBox = document.getElementById('extraRemainBox');
      if (remainBox) {
        remainBox.innerHTML = '<span style="color:var(--green);font-weight:800;font-size:17px">남은 출차 시간: ' + formatMinutes(Math.max(0, newRemain)) + '</span>';
      }

      if (ctx.entryKey && appliedDiscounts[ctx.entryKey]) {
        appliedDiscounts[ctx.entryKey].coverMin = ctx.coverMin;
      }
      if (ctx.plate) {
        knownDiscountCounts[ctx.plate] = (knownDiscountCounts[ctx.plate] || 0) + 1;
      }

      var extraHd = (typeId === '3') ? 1 : 0;
      var extraMd = (typeId === '2') ? 1 : 0;
      google.script.run
        .withSuccessHandler(function() {})
        .withFailureHandler(function() { toast('시트 추가기록 오류 (할인은 정상)', 'info'); })
        .recordToSheet({
          action: 'update', name: 'HR', number: ctx.plate, dept: 'HR',
          memo: '', isGuest: true,
          thd: 0, hd: extraHd, md: extraMd,
          payType: '손님용'
        });
    })
    .withFailureHandler(function(err) {
      btns.forEach(function(b) { b.disabled = false; b.style.opacity = '1'; });
      toast('추가 등록 오류: ' + err.message, 'error');
    })
    .uspaceRegisterDiscountBatch(ctx.carId, [typeId], '1A-605');
}

var statusRecords = [];
var sheetPayTypes = {};
var recentlyDeletedPlates = {};
var statusStartDate = todayStr();
var statusEndDate = todayStr();
var _statusCache = { key: '', time: 0, sheetData: null, uspaceData: null };
var STATUS_CACHE_TTL = 60000;
var STATUS_STALE_TTL = 300000;
var _statusLoading = false;

function todayStr() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function yesterdayStr() {
  var d = new Date(); d.setDate(d.getDate() - 1);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function formatFullTime(str) {
  if (!str) return '';
  var clean = String(str).replace(/\D/g, '');
  if (clean.length >= 14) {
    return clean.substring(8,10) + ':' + clean.substring(10,12) + ':' + clean.substring(12,14);
  } else if (clean.length >= 12) {
    return clean.substring(8,10) + ':' + clean.substring(10,12);
  }
  return str;
}

function parseDateTime14(s) {
  if (!s || s.length < 12) return null;
  var y = parseInt(s.substring(0,4),10);
  var mo = parseInt(s.substring(4,6),10) - 1;
  var d = parseInt(s.substring(6,8),10);
  var h = parseInt(s.substring(8,10),10);
  var mi = parseInt(s.substring(10,12),10);
  var sec = s.length >= 14 ? parseInt(s.substring(12,14),10) : 0;
  return new Date(y, mo, d, h, mi, sec);
}

function calcParkDuration(entryStr, exitStr) {
  if (!entryStr) return '';
  var clean1 = String(entryStr).replace(/\D/g, '');
  var clean2 = exitStr ? String(exitStr).replace(/\D/g, '') : '';
  var d1 = parseDateTime14(clean1);
  if (!d1) return '';
  var d2 = clean2 ? parseDateTime14(clean2) : new Date();
  if (!d2) return '';
  var diffMin = Math.floor((d2 - d1) / 60000);
  if (diffMin < 0) return '';
  var h = Math.floor(diffMin / 60);
  var m = diffMin % 60;
  return (h > 0 ? h + '시간 ' : '') + m + '분';
}

function getDiscountCoverMin(discountName) {
  if (!discountName) return 0;
  if (discountName.indexOf('6시간') >= 0) return 360;
  if (discountName.indexOf('2시간') >= 0) return 120;
  if (discountName.indexOf('1시간') >= 0) return 60;
  if (discountName.indexOf('30분') >= 0) return 30;
  return 0;
}

function calcDeadlineStr(entryDateStr, totalCoverMin) {
  if (!entryDateStr || totalCoverMin <= 0) return '';
  var clean = entryDateStr.replace(/\D/g, '');
  if (clean.length < 12) return '';
  var y = parseInt(clean.substring(0, 4));
  var mo = parseInt(clean.substring(4, 6)) - 1;
  var d = parseInt(clean.substring(6, 8));
  var h = parseInt(clean.substring(8, 10));
  var mi = parseInt(clean.substring(10, 12));
  var deadline = new Date(y, mo, d, h, mi);
  deadline.setMinutes(deadline.getMinutes() + totalCoverMin);
  var now = new Date();
  var diffMs = deadline.getTime() - now.getTime();
  var remainMin = Math.floor(diffMs / 60000);
  var timeStr = String(deadline.getHours()).padStart(2, '0') + ':' + String(deadline.getMinutes()).padStart(2, '0');
  if (remainMin <= 0) {
    return { time: timeStr, label: '마감 초과', urgent: true, overdue: true };
  } else if (remainMin <= 30) {
    return { time: timeStr, label: remainMin + '분 남음', urgent: true, overdue: false };
  } else {
    return { time: timeStr, label: '', urgent: false, overdue: false };
  }
}
