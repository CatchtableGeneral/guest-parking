function groupStatusRecords(data) {
  var map = {};
  for (var i = 0; i < data.length; i++) {
    var r = data[i];
    var plate = String(r.carno || '').trim();
    if (!plate) continue;
    var entryStr = String(r.entry_date || '');
    var entryTimeKey = entryStr.length >= 14 ? entryStr.substring(0, 14) : entryStr;
    var key = entryTimeKey + '_' + plate;

    if (!map[key]) {
      var exitStr = String(r.dtOutDate || '').trim();
      var dateKey = entryStr.length >= 8 ? entryStr.substring(0, 8) : '';
      var isPast = dateKey && dateKey < todayStr8();
      map[key] = {
        plate: plate,
        entryDate: entryStr,
        exitDate: exitStr,
        paidStat: r.paid_stat || '',
        isParking: false,
        discounts: [],
        totalCoverMin: 0,
        latestReg: '',
        ownerName: '',
        payType: ''
      };
      map[key].isParking = !exitStr && !isPast;
    }
    var exitCheck = String(r.dtOutDate || '').trim();
    if (exitCheck && !map[key].exitDate) {
      map[key].exitDate = exitCheck;
      var isPastDate = (entryStr.length >= 8 ? entryStr.substring(0, 8) : '') < todayStr8();
      map[key].isParking = !exitCheck && !isPastDate;
    }

    if (r.discount_name) {
      map[key].discounts.push({
        name: r.discount_name || '',
        time: r.reg_date || '',
        price: r.discount_price || 0,
        tckttrnsId: r.tckttrns_id || '',
        idno: r.idno || ''
      });
      map[key].totalCoverMin += getDiscountCoverMin(r.discount_name);
    }
    var regStr = String(r.reg_date || '');
    if (regStr > map[key].latestReg) map[key].latestReg = regStr;
  }

  var groups = [];
  for (var k in map) {
    if (map.hasOwnProperty(k)) {
      groups.push(map[k]);
    }
  }
  groups.sort(function(a, b) {
    return (b.latestReg || b.entryDate || '').localeCompare(a.latestReg || a.entryDate || '');
  });
  return groups;
}

function _mergeSheetPayTypes() {
  for (var i = 0; i < statusRecords.length; i++) {
    var g = statusRecords[i];
    var plateClean = g.plate.replace(/\s/g, '');
    var info = sheetPayTypes[plateClean] || sheetPayTypes[g.plate];
    if (info) {
      g.payType = info.payType || '';
      if (info.regName) g.sheetRegName = info.regName;
    }
    if (!g.payType && g.discounts.length > 0) {
      var totalPrice = 0;
      for (var pi = 0; pi < g.discounts.length; pi++) {
        totalPrice += Number(g.discounts[pi].price) || 0;
      }
      if (totalPrice > 0) {
        g.payType = '할인권 구매';
      }
    }

    // ★ 23시 이후 퇴근 보정: 출차시각이 23시 이후이면 "추가근무 (23시 퇴근)"으로 변경
    //   (재입차로 인해 "할인권 구매"로 표시되는 것 방지)
    if (g.exitDate) {
      var exitClean = String(g.exitDate).replace(/\D/g, '');
      if (exitClean.length >= 10) {
        var exitHH = parseInt(exitClean.substring(8, 10), 10);
        if (exitHH >= 23 && (g.payType === '할인권 구매' || !g.payType)) {
          g.payType = '추가근무 (23시 퇴근)';
        }
      }
    }
    // ★ 아직 주차중 + 현재시각이 23시 이후 → "할인권 구매" 대신 "추가근무" 표시
    if (g.isParking && (g.payType === '할인권 구매' || (!g.payType && g.discounts.length > 0))) {
      var nowHour = new Date().getHours();
      if (nowHour >= 23 || nowHour < 6) {
        g.payType = '추가근무 (23시 퇴근)';
      }
    }
  }
}

function _updateStatusSummary() {
  var totalCars = statusRecords.length;
  var totalDiscounts = 0;
  var totalParking = 0;
  for (var i = 0; i < statusRecords.length; i++) {
    totalDiscounts += statusRecords[i].discounts.length;
    if (statusRecords[i].isParking) totalParking++;
  }
  document.getElementById('sumCars').textContent = totalCars;
  document.getElementById('sumDiscounts').textContent = totalDiscounts;
  document.getElementById('sumParking').textContent = totalParking;
}

function _renderFromCache() {
  sheetPayTypes = _statusCache.sheetData || {};
  statusRecords = groupStatusRecords(_statusCache.uspaceData.data || []);
  _mergeSheetPayTypes();
  renderStatus();
  _updateStatusSummary();
}

function loadStatus(callback, forceRefresh) {
  var cacheKey = statusStartDate + '~' + statusEndDate;
  var now = Date.now();
  var cacheAge = now - _statusCache.time;
  var cacheHit = _statusCache.key === cacheKey && _statusCache.uspaceData;

  if (!forceRefresh && cacheHit && cacheAge < STATUS_CACHE_TTL) {
    _renderFromCache();
    if (callback) callback();
    return;
  }

  var showedStale = false;
  if (!forceRefresh && cacheHit && cacheAge < STATUS_STALE_TTL) {
    _renderFromCache();
    if (callback) { callback(); callback = null; }
    showedStale = true;
  }

  if (_statusLoading && showedStale) return;
  _statusLoading = true;

  var list = document.getElementById('statusList');
  if (!showedStale) {
    list.innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--text-tertiary)">데이터를 불러오는 중...</div>';
  }

  var pending = 2;
  var uspaceRes = null;
  var loadError = null;

  function tryFinish() {
    pending--;
    if (pending > 0) return;
    _statusLoading = false;

    if (loadError) {
      if (!showedStale) {
        list.innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--red)">' + esc(loadError) + '</div>';
      }
      if (callback) callback();
      return;
    }
    if (!uspaceRes || !uspaceRes.ok) {
      if (!showedStale) {
        list.innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--red)">' + esc((uspaceRes && uspaceRes.msg) || '데이터 로드 실패') + '</div>';
      }
      if (callback) callback();
      return;
    }

    _statusCache = { key: cacheKey, time: Date.now(), sheetData: sheetPayTypes, uspaceData: uspaceRes };

    statusRecords = groupStatusRecords(uspaceRes.data || []);
    _mergeSheetPayTypes();
    renderStatus();
    _updateStatusSummary();
    if (callback) callback();
  }

  google.script.run
    .withSuccessHandler(function(types) {
      sheetPayTypes = types || {};
      tryFinish();
    })
    .withFailureHandler(function() {
      sheetPayTypes = {};
      tryFinish();
    })
    .getSheetPayTypes(statusStartDate);

  google.script.run
    .withSuccessHandler(function(res) {
      uspaceRes = res;
      tryFinish();
    })
    .withFailureHandler(function(err) {
      loadError = '오류: ' + (err.message || '데이터 로드 실패');
      tryFinish();
    })
    .uspaceGetStatus(statusStartDate, statusEndDate, '1A-605');
}

function renderStatus() {
  var list = document.getElementById('statusList');
  var query = (document.getElementById('statusSearch').value || '').trim().toLowerCase();
  var groups = statusRecords;

  if (query) {
    groups = groups.filter(function(g) {
      return g.plate.toLowerCase().indexOf(query) >= 0 ||
             (g.ownerName && g.ownerName.toLowerCase().indexOf(query) >= 0);
    });
  }

  if (groups.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--text-tertiary);font-weight:500">' +
                     '등록된 차량이 없습니다</div>';
    return;
  }

  var html = '';
  for (var i = 0; i < groups.length; i++) {
    var g = groups[i];
    var entryFmt = formatFullTime(g.entryDate);
    var exitFmt = g.exitDate ? formatFullTime(g.exitDate) : '';
    var parkDur = calcParkDuration(g.entryDate, g.exitDate);

    html += '<div class="sv-card ' + (g.isParking ? 'parking-card' : 'exited-card') + '">';

    var deadline = null;
    if (g.isParking && g.totalCoverMin > 0) {
      deadline = calcDeadlineStr(g.entryDate, g.totalCoverMin);
    }

    // payType tag
    var payTypeTag = '';
    if (g.payType) {
      var ptClass = 'type-ticket';
      var ptIcon = 'credit_card';
      var ptLabel = g.payType;
      if (g.payType.indexOf('손님') >= 0) {
        ptClass = 'type-guest'; ptIcon = 'person'; ptLabel = '손님용';
      } else if (g.payType.indexOf('추가근무') >= 0 || g.payType.indexOf('야간') >= 0) {
        ptClass = 'type-night'; ptIcon = 'dark_mode';
        var hourMatch = g.payType.match(/(\d+)시/);
        ptLabel = hourMatch ? hourMatch[1] + '시 야간' : '야간';
      } else if (g.payType.indexOf('법인') >= 0) {
        ptClass = 'type-corp'; ptIcon = 'business'; ptLabel = '법인차량';
      } else if (g.payType.indexOf('할인권') >= 0) {
        ptClass = 'type-ticket'; ptIcon = 'confirmation_number'; ptLabel = '급여공제';
      }
      payTypeTag = '<span class="sv-paytype ' + ptClass + '">' +
                   '<span class="material-symbols-rounded" style="font-size:12px">' + ptIcon + '</span>' +
                   esc(ptLabel) + '</span>';
    }

    // registrant name tag
    var regNameTag = '';
    if (g.sheetRegName && !g.ownerName) {
      regNameTag = '<span style="font-size:13px;color:var(--text-secondary);font-weight:600;margin-left:8px">' + esc(g.sheetRegName) + '</span>';
    }

    html += '<div class="sv-card-top">' +
            '<div>' +
            '<span class="sv-plate">' + esc(g.plate) + '</span>' +
            (g.ownerName ? '<span style="font-size:13px;color:#FD3D00;font-weight:600;margin-left:8px">' + esc(g.ownerName) + '</span>' : regNameTag) +
            payTypeTag +
            '</div>' +
            (g.isParking
              ? '<span class="sv-badge parking">주차중</span>'
              : '<span class="sv-badge exited">출차</span>') +
            '</div>';

    // deadline display
    if (deadline) {
      var dlColor = deadline.overdue ? 'var(--red)' : (deadline.urgent ? '#f59e0b' : 'var(--blue)');
      var dlIcon = deadline.overdue ? 'warning' : 'schedule';
      html += '<div style="display:flex;align-items:center;gap:6px;padding:8px 12px;margin:4px 0 2px;' +
              'background:' + (deadline.overdue ? 'rgba(239,68,68,.08)' : (deadline.urgent ? 'rgba(245,158,11,.08)' : 'rgba(59,130,246,.06)')) + ';' +
              'border-radius:var(--radius-sm);border-left:3px solid ' + dlColor + '">' +
              '<span class="material-symbols-rounded" style="font-size:18px;color:' + dlColor + '">' + dlIcon + '</span>' +
              '<span style="font-size:14px;font-weight:700;color:' + dlColor + '">' +
              esc(deadline.time) + '까지 출차' +
              '</span>';
      if (deadline.label) {
        html += '<span style="font-size:12px;font-weight:600;color:' + dlColor + ';margin-left:4px;' +
                (deadline.overdue ? 'background:rgba(239,68,68,.12);padding:2px 8px;border-radius:10px' : '') + '">' +
                esc(deadline.label) + '</span>';
      }
      html += '</div>';
    }

    // time info
    html += '<div class="sv-times">' +
            '<span><span class="time-label">입차</span><span class="time-value">' + esc(entryFmt) + '</span></span>';
    if (exitFmt) {
      html += '<span><span class="time-label">출차</span><span class="time-value">' + esc(exitFmt) + '</span></span>';
    }
    if (parkDur) {
      html += '<span class="time-duration">' + esc(parkDur) + '</span>';
    }
    html += '</div>';

    // discount details (dropdown)
    if (g.discounts.length === 0) {
      html += '<div class="sv-no-discount">할인 적용 없음</div>';
    } else {
      var totalPrice = 0;
      for (var j = 0; j < g.discounts.length; j++) {
        totalPrice += Number(g.discounts[j].price) || 0;
      }
      var totalStr = totalPrice > 0 ? totalPrice.toLocaleString() + '원' : '전체 무료';

      html += '<div class="sv-discount-toggle" onclick="toggleDiscount(this)">' +
              '<span class="toggle-label">' +
              '<span class="material-symbols-rounded" style="font-size:16px">confirmation_number</span>' +
              '할인 내역 <span class="cnt">' + g.discounts.length + '건</span>' +
              '<span style="color:var(--text-secondary);font-weight:600;font-size:12px;margin-left:4px">' + esc(totalStr) + '</span>' +
              '</span>' +
              '<span class="material-symbols-rounded toggle-arrow">expand_more</span>' +
              '</div>';

      var deletableDiscounts = [];
      html += '<div class="sv-discounts" id="svDisc' + i + '">';
      for (var j2 = 0; j2 < g.discounts.length; j2++) {
        var d = g.discounts[j2];
        var priceStr = Number(d.price) > 0 ? Number(d.price).toLocaleString() + '원' : '무료';
        html += '<div class="sv-discount-row">' +
                '<span class="d-name">' + esc(d.name || '할인') + '</span>' +
                '<span class="d-price">' + esc(priceStr) + '</span>';
        if (g.isParking && d.tckttrnsId) {
          deletableDiscounts.push({ tckttrnsId: d.tckttrnsId, idno: d.idno });
          html += '<button class="d-del-btn" onclick="event.stopPropagation();deleteDiscount(\'' +
                  esc(d.tckttrnsId) + '\',\'' + esc(d.idno) + '\',\'' +
                  esc(g.plate) + '\',' + (Number(d.price)||0) + ')">삭제</button>';
        }
        html += '</div>';
      }
      if (deletableDiscounts.length >= 2) {
        html += '<button class="sv-del-all-btn" ' +
                'onclick="event.stopPropagation();deleteAllDiscounts(\'' + esc(g.plate) + '\',' +
                JSON.stringify(deletableDiscounts).replace(/"/g, '&quot;') + ')">' +
                '<span class="material-symbols-rounded">delete_sweep</span>' +
                '전체 삭제 (' + deletableDiscounts.length + '건)</button>';
      }
      html += '</div>';
    }
    html += '</div>';
  }
  list.innerHTML = html;
}

function toggleDiscount(toggleEl) {
  var discDiv = toggleEl.nextElementSibling;
  if (!discDiv) return;
  var isOpen = discDiv.classList.contains('open');
  if (isOpen) {
    discDiv.classList.remove('open');
    toggleEl.classList.remove('open');
  } else {
    discDiv.classList.add('open');
    toggleEl.classList.add('open');
  }
}

function filterStatus() { renderStatus(); }

/* Date navigation */
function updateDateNavLabel() {
  var d = new Date(statusStartDate + 'T00:00:00');
  var days = ['일','월','화','수','목','금','토'];
  var today = todayStr();
  var yest = yesterdayStr();
  var label = '';
  if (statusStartDate === today) {
    label = '오늘';
  } else if (statusStartDate === yest) {
    label = '어제';
  } else {
    label = (d.getMonth()+1) + '/' + d.getDate() + ' (' + days[d.getDay()] + ')';
  }
  var dot = (statusStartDate === today) ? '<span class="today-dot"></span>' : '';
  document.getElementById('dateNavText').innerHTML = label + dot;
  document.getElementById('dateNavInput').value = statusStartDate;
  document.getElementById('dateNavInput').max = today;
}

function navDate(offset) {
  var d = new Date(statusStartDate + 'T00:00:00');
  d.setDate(d.getDate() + offset);
  var today = new Date(); today.setHours(0,0,0,0);
  if (d > today) return;
  var ds = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');

/* Delete discount */
function deleteDiscount(tckttrnsId, idno, plate, price) {
  showModal('warn', '할인 삭제',
    '차량 <b>' + esc(plate) + '</b>의 할인을 삭제하시겠습니까?',
    [
      { text: '삭제', cls: 'danger', action: function() {
        closeModal();
        showLoading(true, '할인 삭제중...');
        google.script.run
          .withSuccessHandler(function(res) {
            showLoading(false);
            knownDiscountCounts[plate] = 0;
            Object.keys(appliedDiscounts).forEach(function(key) {
              if (key.indexOf(plate) === 0) delete appliedDiscounts[key];
            });
            recentlyDeletedPlates[plate] = true;
            toast('할인 삭제 완료', 'success');
            setTimeout(function() { loadBalance(); }, 1500); // ★ 잔액 갱신
            // ★ 낙관적 UI: 화면에서 즉시 제거
            _optimisticRemoveDiscount(plate, tckttrnsId);
            // 시트 동기화 (백그라운드)
            google.script.run
              .withSuccessHandler(function(r) {
                if (r && !r.deleted) toast('시트: 해당 기록 없음', 'info');
              })
              .withFailureHandler(function(e) { toast('시트 삭제 오류: ' + e.message, 'error'); })
              .deleteFromSheet(plate, price, 1);
            _statusCache.time = 0;
          })
          .withFailureHandler(function(err) {
            showLoading(false);
            toast('삭제 실패: ' + err.message, 'error');
          })
          .uspaceDeleteDiscount(tckttrnsId, idno);
      }},
      { text: '취소', cls: 'secondary', action: closeModal }
    ]
  );
}

function deleteAllDiscounts(plate, discounts) {
  if (typeof discounts === 'string') discounts = JSON.parse(discounts);
  if (!discounts || discounts.length === 0) return;
  showModal('warn', '전체 삭제',
    '차량 <b>' + esc(plate) + '</b>의 할인 <b>' + discounts.length + '건</b>을 모두 삭제하시겠습니까?',
    [
      { text: '전체 삭제 (' + discounts.length + '건)', cls: 'danger', action: function() {
        closeModal();
        deleteAllBatch(plate, discounts);
      }},
      { text: '취소', cls: 'secondary', action: closeModal }
    ]
  );
}

function deleteAllBatch(plate, discounts) {
  showLoading(true, '할인 ' + discounts.length + '건 삭제중...');
  google.script.run
    .withSuccessHandler(function(res) {
      showLoading(false);
      knownDiscountCounts[plate] = 0;
      Object.keys(appliedDiscounts).forEach(function(key) {
        if (key.indexOf(plate) === 0) delete appliedDiscounts[key];
      });
      recentlyDeletedPlates[plate] = true;
      if (res.failed === 0) {
        toast(res.success + '건 삭제 완료', 'success');
      } else {
        toast(res.success + '건 삭제, ' + res.failed + '건 실패', 'error');
        if (res.errors && res.errors.length > 0) {
          toast(res.errors[0], 'error');
        }
      }
      setTimeout(function() { loadBalance(); }, 1500); // ★ 잔액 갱신
      // ★ 낙관적 UI: 해당 차량 모든 할인 즉시 제거
      _optimisticRemoveAllDiscounts(plate);
      // 시트 삭제 (백그라운드)
      google.script.run
        .withSuccessHandler(function(r) {
          if (r && !r.deleted) toast('시트: 해당 기록 없음', 'info');
          else if (r && r.deleted) toast('시트 기록도 삭제됨', 'success');
        })
        .withFailureHandler(function(e) { toast('시트 전체삭제 오류: ' + e.message, 'error'); })
        .deleteAllFromSheet(plate);
      _statusCache.time = 0;
    })
    .withFailureHandler(function(err) {
      showLoading(false);
      toast('삭제 실패: ' + err.message, 'error');
    })
    .uspaceDeleteDiscountBatch(discounts);

/**
 * 낙관적 UI: 개별 할인 삭제 → statusRecords에서 제거 후 즉시 렌더링
 */
function _optimisticRemoveDiscount(plate, tckttrnsId) {
  for (var i = 0; i < statusRecords.length; i++) {
    var g = statusRecords[i];
    if (g.carNo !== plate || !g.discounts) continue;
    for (var j = g.discounts.length - 1; j >= 0; j--) {
      if (String(g.discounts[j].tckttrnsId) === String(tckttrnsId)) {
        g.discounts.splice(j, 1);
        g.discountCnt = g.discounts.length;
        break;
      }
    }
    if (g.discounts.length === 0) {
      statusRecords.splice(i, 1);
    }
    break;
  }
  _updateStatusSummary();
  renderStatus();
}

/**
 * 낙관적 UI: 전체 삭제 → 해당 차량의 모든 할인을 제거 후 즉시 렌더링
 */
function _optimisticRemoveAllDiscounts(plate) {
  for (var i = statusRecords.length - 1; i >= 0; i--) {
    if (statusRecords[i].carNo === plate) {
      statusRecords.splice(i, 1);
    }
  }
  _updateStatusSummary();
  renderStatus();
}

function showModal(type, title, body, buttons) {
  var box = document.getElementById('modalBox');
  var iconMap = { success: 'check_circle', error: 'error', warn: 'warning', info: 'info' };

  var html = '<div class="modal-handle"></div>' +
             '<div class="modal-icon-wrap ' + type + '">' +
             '<span class="material-symbols-rounded">' + (iconMap[type] || 'info') + '</span></div>' +
             '<div class="modal-title">' + title + '</div>' +
             '<div class="modal-body">' + body + '</div>';

  if (buttons && buttons.length) {
    var actionsClass = 'modal-actions';
    if (buttons.length === 2) actionsClass += ' two-buttons';
    html += '<div class="' + actionsClass + '">';
    for (var i = 0; i < buttons.length; i++) {
      var b = buttons[i];
      html += '<button class="modal-btn ' + (b.cls || 'primary') + '" id="modalBtn' + i + '">' + esc(b.text) + '</button>';
    }
    html += '</div>';
  }

  box.innerHTML = html;
  document.getElementById('modalOverlay').classList.add('show');

  if (buttons) {
    for (var j = 0; j < buttons.length; j++) {
      (function(fn) {
        var btn = document.getElementById('modalBtn' + j);
        if (btn && fn) btn.onclick = fn;
      })(buttons[j].action);
    }
  }
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

   TOAST
   ============================================================ */
function toast(msg, type) {
  var container = document.getElementById('toastContainer');
  var iconMap = { success: 'check_circle', error: 'error', info: 'info' };
  var el = document.createElement('div');
  el.className = 'toast ' + (type || 'info');
  el.innerHTML = '<span class="material-symbols-rounded" style="font-size:18px">' +
                 (iconMap[type] || 'info') + '</span>' + esc(msg);
  container.appendChild(el);

  requestAnimationFrame(function() {
    requestAnimationFrame(function() { el.classList.add('show'); });
  });
  setTimeout(function() {
    el.classList.remove('show');
    setTimeout(function() { el.remove(); }, 300);
  }, 2500);
}

  var HH = String(now.getHours()).padStart(2,'0');
  var MM = String(now.getMinutes()).padStart(2,'0');

      badge.style.background = 'var(--blue-soft)';

/* ============================================================
   iOS SCALE 보호 — 인라인 스타일 복원
   2x 확대 상태(transform 또는 zoom)에서 iOS가 input 포커스 시
   자동 확대해도, 블러 후 원래 스케일링으로 확실히 되돌립니다.
   (2x 확대 상태에서 input 유효 폰트=32px → iOS 자동확대 안 함.
    만약 발생해도 이 코드가 원복.)
   ============================================================ */
(function protectScale() {
  // GitHub Pages 직접 호스팅 시에는 스케일 보호 불필요 (1x이므로)
  if (!window.__GAS_MODE) {
    console.log('[protectScale] 직접 호스팅 모드 → 스케일 보호 비활성화');
    return;
  }

  var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
              (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  if (!isIOS) return;

  var appEl = document.getElementById('app');
  if (!appEl) return;

  // GAS iframe 모드에서만: transform:scale(2) 복원
  function restoreScale() {
    appEl.style.transform = 'scale(2)';
    appEl.style.webkitTransform = 'scale(2)';
    appEl.style.transformOrigin = 'top left';
    appEl.style.webkitTransformOrigin = 'top left';
    appEl.style.width = '50vw';
    appEl.style.height = '50vh';
    appEl.style.overflow = 'hidden';
    document.body.style.overflow = 'hidden';
    document.documentElement.style.overflow = 'hidden';
    window.scrollTo(0, 0);
    document.body.scrollTop = 0;
    document.documentElement.scrollTop = 0;
  }

  document.addEventListener('focusin', function(e) {
    var t = (e.target.tagName || '').toUpperCase();
    if (t === 'INPUT' || t === 'TEXTAREA' || t === 'SELECT') {
      setTimeout(function() {
        window.scrollTo(0, 0);
        document.body.scrollTop = 0;
        document.documentElement.scrollTop = 0;
      }, 50);
      setTimeout(function() {
        window.scrollTo(0, 0);
        restoreScale();
      }, 200);
      setTimeout(function() {
        window.scrollTo(0, 0);
      }, 500);
    }
  });

  document.addEventListener('focusout', function(e) {
    var t = (e.target.tagName || '').toUpperCase();
    if (t === 'INPUT' || t === 'TEXTAREA' || t === 'SELECT') {
      setTimeout(restoreScale, 300);
    }
  });

  if (window.visualViewport) {
    var vpTimeout;
    window.visualViewport.addEventListener('resize', function() {
      clearTimeout(vpTimeout);
      vpTimeout = setTimeout(function() {
        if (window.visualViewport.scale > 1.02) {
          restoreScale();
        }
      }, 100);
    });
    window.visualViewport.addEventListener('scroll', function() {
      window.scrollTo(0, 0);
    });
  }
})();

  var lastTap = 0;

        } else {

          try {
            localStorage.removeItem(AUTH_STORAGE_KEY);
            localStorage.removeItem(AUTH_TS_KEY);

      })

    // uspace 연결 확인 (백그라운드)

      .withSuccessHandler(function(r) {
        if (r.loggedIn || r.hasCreds) showSessionBanner('uspace 연결됨', 'ok', 2000);
      })
      .withFailureHandler(function() {})
      .checkLoginStatus();

  } else if (savedPhone && !cacheValid) {
    // ── 캐시 만료(24h 초과): 서버 확인 필수 ──
    showLoading(true, '권한 확인 중...');
    google.script.run
      .withSuccessHandler(function(res) {
        showLoading(false);
        if (res && res.authorized) {
          authedPhone = savedPhone;
          try { localStorage.setItem(AUTH_TS_KEY, String(Date.now())); } catch(e) {}
          showScreen('homeScreen');
          setTimeout(function() { loadBalance(); }, 800); // ★ 잔액 프리로드
          setTimeout(function() { loadEmployeeCarNumbers(); }, 1000); // ★ 자차목록 프리로드
          showSessionBanner('인증됨: ' + savedPhone, 'ok', 3000);
          google.script.run
            .withSuccessHandler(function(r) {
              if (r.loggedIn || r.hasCreds) showSessionBanner('uspace 연결됨', 'ok', 2000);
            })
            .withFailureHandler(function() {})
            .checkLoginStatus();
        } else {
          try {
            localStorage.removeItem(AUTH_STORAGE_KEY);
            localStorage.removeItem(AUTH_TS_KEY);
          } catch(e) {}
          authedPhone = '';
          showScreen('phoneScreen');
          showModal('warn', '접근 차단',
            '등록된 권한이 없습니다.<br>관리자에게 문의해주세요.',
            [{ text: '확인', cls: 'primary', action: closeModal }]

      })
      .withFailureHandler(function(err) {

        showScreen('homeScreen');
        showSessionBanner('오프라인 모드 (권한 확인 불가)', 'warn', 5000);
      })
      .guestCheckAuth(savedPhone);

  } else {
    // ── 저장된 번호 없음 → 인증 화면 ──
    showScreen('phoneScreen');
    google.script.run
      .withSuccessHandler(function(res) {

      })
      .withFailureHandler(function() {})
      .checkLoginStatus();
  }
})();

(function hideGasBanner() {
  function removeBannerElements() {
    var allEls = document.querySelectorAll('div, p, span, a, section, header');
    for (var i = 0; i < allEls.length; i++) {
      var el = allEls[i];

      var txt = (el.textContent || '').trim();
      if ((txt.indexOf('이 애플리케이션은') >= 0 && txt.indexOf('Google') >= 0) ||
          (txt.indexOf('This application') >= 0 && txt.indexOf('Google Apps Script') >= 0) ||

        el.style.cssText = 'display:none!important;height:0!important;overflow:hidden!important;';
        if (el.parentElement && !document.getElementById('app').contains(el.parentElement)) {
          el.parentElement.style.cssText = 'display:none!important;height:0!important;overflow:hidden!important;';
        }
      }
    }

  // 즉시 + 지연 실행 (iOS에서 배너가 늦게 로드될 수 있으므로 촘촘하게)
  removeBannerElements();
  setTimeout(removeBannerElements, 100);
  setTimeout(removeBannerElements, 300);
  setTimeout(removeBannerElements, 500);
  setTimeout(removeBannerElements, 1000);
  setTimeout(removeBannerElements, 2000);
  setTimeout(removeBannerElements, 3000);
  setTimeout(removeBannerElements, 5000);
  setTimeout(removeBannerElements, 8000);
  // 이후 10초 간격으로 계속 체크 (배너가 동적으로 재생성될 수 있음)
  setInterval(removeBannerElements, 10000);

  // 동적으로 추가되는 요소 감시
  if (window.MutationObserver) {
    var observer = new MutationObserver(function(mutations) {
      for (var i = 0; i < mutations.length; i++) {
        var nodes = mutations[i].addedNodes;
        for (var j = 0; j < nodes.length; j++) {
          var node = nodes[j];
          if (node.nodeType !== 1) continue;
          var txt = (node.textContent || '').trim();
          if ((txt.indexOf('이 애플리케이션은') >= 0 && txt.indexOf('Google') >= 0) ||
              (txt.indexOf('This application') >= 0 && txt.indexOf('Google Apps Script') >= 0)) {
            node.style.cssText = 'display:none!important;height:0!important;overflow:hidden!important;';
          }
        }
      }
    });
    observer.observe(document.documentElement, { childList: true, subtree: true });
  }

  // ★ 부모 프레임 접근 시도 (같은 도메인일 경우만 성공)
  try {
    if (window.top !== window.self) {
      var topDoc = window.top.document;

      for (var k = 0; k < topEls.length; k++) {
        var txt = (topEls[k].textContent || '').trim();
        if ((txt.indexOf('이 애플리케이션은') >= 0 || txt.indexOf('This application') >= 0) &&
            txt.indexOf('Google') >= 0) {
          topEls[k].style.cssText = 'display:none!important;';
        }
      }
    }
  } catch(e) { /* cross-origin — 무시 */ }
})();

function _tagClass(type) {
  if (type === '기능추가') return 'feat';
  if (type === '버그수정') return 'fix';
  if (type === '개선') return 'improve';
  if (type === '제거') return 'remove';
  return 'improve';
}

function _buildChangelogHTML(changelog, limit) {
  if (!changelog || !changelog.length) return '<p style="color:var(--text-tertiary);font-size:13px;">변경 내역이 없습니다.</p>';
  var list = limit ? changelog.slice(0, limit) : changelog;
  var html = '';
  for (var i = 0; i < list.length; i++) {
    var entry = list[i];
    html += '<div class="changelog-section">';
    html += '<div class="cl-title">v' + esc(entry.version) + ' <span class="cl-date">' + esc(entry.date) + '</span></div>';
    for (var j = 0; j < entry.items.length; j++) {
      var item = entry.items[j];
      html += '<div class="cl-item"><span class="cl-tag ' + _tagClass(item.type) + '">' + esc(item.type) + '</span><span>' + esc(item.text) + '</span></div>';
    }
    html += '</div>';
  }
  return html;
}

function checkAppVersion() {
  // ★ 이미 모달이 떠있으면 중복 체크 안 함
  var modal = document.getElementById('modalOverlay');
  if (modal && modal.classList.contains('show')) return;

  google.script.run
    .withSuccessHandler(function(res) {
      if (!res || res.version === undefined) return;
      var serverVer = String(res.version);
      _changelogData = res.changelog || [];

      try { localStorage.setItem('appChangelog', JSON.stringify(_changelogData)); } catch(e) {}

      // ★ 핵심: HTML 자체 버전(APP_LOCAL_VERSION)과 서버 버전 직접 비교
      if (APP_LOCAL_VERSION !== serverVer) {
        _pendingServerVer = serverVer;
        var dateStr = '';
        if (_changelogData.length > 0 && _changelogData[0].date) dateStr = ' (' + _changelogData[0].date + ')';

        var newEntries = [];
        for (var i = 0; i < _changelogData.length; i++) {
          if (_changelogData[i].version === APP_LOCAL_VERSION) break;
          newEntries.push(_changelogData[i]);
        }
        var changelogHtml = _buildChangelogHTML(newEntries.length ? newEntries : _changelogData, 3);

        showModal('warn', '새 버전이 있습니다',
          '<div style="text-align:center;margin-bottom:12px">' +
          '<div style="font-size:15px;font-weight:700;color:var(--accent)">v' + APP_LOCAL_VERSION + ' → v' + serverVer + dateStr + '</div>' +
          '</div>' +
          '<div style="max-height:30vh;overflow-y:auto;text-align:left;margin-bottom:12px">' + changelogHtml + '</div>' +
          '<div style="background:var(--bg-input);border:1px solid var(--border-default);border-radius:12px;padding:14px 16px">' +
          '<p style="font-size:13px;font-weight:700;color:var(--text-primary);margin:0 0 8px">업데이트 방법</p>' +
          '<p style="font-size:12px;color:var(--text-secondary);margin:0;line-height:1.8">' +
          '① 최근 앱 목록에서 브라우저를 <strong>완전히 종료</strong><br>' +
          '② 브라우저를 다시 열고 접속하면 자동 반영됩니다</p>' +
          '</div>',
          [{ text: '확인', cls: 'secondary', action: closeModal }]
        );
        var dot = document.querySelector('.fab-dot');
        if (dot) dot.classList.add('show');
      } else {
        // ★ HTML과 서버 일치 → localStorage 동기화 (기록용)
        try { localStorage.setItem('appVersion', serverVer); } catch(e) {}
      }
    })
    .withFailureHandler(function(err) {
      console.log('버전 체크 실패 (무시):', err);
    })
    .getAppVersion();
}

function manualCheckUpdate() {
  toast('업데이트 확인 중...', 'info');
  google.script.run
    .withSuccessHandler(function(res) {
      if (!res || res.version === undefined) { toast('서버 응답 오류', 'error'); return; }
      var serverVer = String(res.version);
      _changelogData = res.changelog || [];
      try { localStorage.setItem('appChangelog', JSON.stringify(_changelogData)); } catch(e) {}
      if (APP_LOCAL_VERSION !== serverVer) {
        // ★ 새 버전 있음 → showModal로 메모리 정리 안내
        var dateStr = '';
        if (_changelogData.length > 0 && _changelogData[0].date) dateStr = ' (' + _changelogData[0].date + ')';
        showModal('warn', '새 버전이 있습니다',
          '<div style="text-align:center;margin-bottom:12px">' +
          '<div style="font-size:15px;font-weight:700;color:var(--accent)">v' + APP_LOCAL_VERSION + ' → v' + serverVer + dateStr + '</div>' +
          '</div>' +
          '<div style="background:var(--bg-input);border:1px solid var(--border-default);border-radius:12px;padding:14px 16px">' +
          '<p style="font-size:13px;font-weight:700;color:var(--text-primary);margin:0 0 8px">업데이트 방법</p>' +
          '<p style="font-size:12px;color:var(--text-secondary);margin:0;line-height:1.8">' +
          '① 최근 앱 목록에서 브라우저를 <strong>완전히 종료</strong><br>' +
          '② 브라우저를 다시 열고 접속하면 자동 반영됩니다</p>' +
          '</div>',
          [{ text: '확인', cls: 'secondary', action: closeModal }]
        );
      } else {
        toast('현재 최신 버전입니다 (v' + serverVer + ')', 'success');
      }
    })
    .withFailureHandler(function(err) {
      toast('서버 연결 실패: ' + (err.message || ''), 'error');
    })
    .getAppVersion();
}

function showChangelog() {
  // ★ 데이터가 없으면 순서대로: localStorage → 서버
  if (!_changelogData || !_changelogData.length) {
    try {
      var cached = JSON.parse(localStorage.getItem('appChangelog') || '[]');
      if (cached && cached.length) { _changelogData = cached; }
    } catch(e) {}
  }
  if (!_changelogData || !_changelogData.length) {
    toast('업데이트 내역 불러오는 중...', 'info');
    google.script.run
      .withSuccessHandler(function(res) {
        if (res && res.changelog && res.changelog.length) {
          _changelogData = res.changelog;
          try { localStorage.setItem('appChangelog', JSON.stringify(_changelogData)); } catch(e) {}
        }
        _showChangelogModal();
      })
      .withFailureHandler(function() {
        toast('서버 연결 실패', 'error');
      })
      .getAppVersion();
    return;
  }
  _showChangelogModal();
}

function _showChangelogModal() {
  // ★ 문의하기와 동일한 showModal() 사용 — 확실하게 동작
  var data = _changelogData || [];
  var content = _buildChangelogHTML(data);
  showModal('info', '업데이트 내역',
    '<div style="max-height:50vh;overflow-y:auto;text-align:left">' + content + '</div>',
    [{ text: '닫기', cls: 'secondary', action: closeModal }]
  );
  // 알림 점 + 코멘트 + 홈화면 힌트 제거
  var dot = document.querySelector('.fab-dot');
  if (dot) dot.classList.remove('show');
  var comment = document.getElementById('fabComment');
  if (comment) comment.classList.remove('show');
  var regHint = document.getElementById('homeChangelogHint');
  if (regHint) regHint.style.display = 'none';
  try { localStorage.setItem('lastSeenChangelogVer', APP_LOCAL_VERSION); } catch(e) {}
}

// ★ 최근 업데이트 코멘트 표시 (아직 내역을 안 본 경우)
(function() {
  try {
    var lastSeen = localStorage.getItem('lastSeenChangelogVer') || '';
    if (lastSeen !== APP_LOCAL_VERSION) {
      var c = document.getElementById('fabComment');
      if (c) c.classList.add('show');
      var d = document.querySelector('.fab-dot');
      if (d) d.classList.add('show');
      var rh = document.getElementById('homeChangelogHint');
      if (rh) rh.style.display = 'flex';
    }
  } catch(e) {}
})();
setTimeout(function() { checkAppVersion(); }, 3000);
// ★ 상시 켜놓는 기기용: 1분마다 자동 버전 체크
setInterval(function() { checkAppVersion(); }, 60 * 1000);

</script>

<!-- ★ 왼쪽 상단 상시 아이콘 (업데이트 내역) -->
<div class="changelog-fab" onclick="showChangelog()" title="업데이트 내역">
  <span class="material-symbols-rounded">update</span>
  <span class="fab-dot"></span>
  <span class="fab-comment" id="fabComment">최근 업데이트된 내역이 있어요!</span>
</div>

</body>
</html>
