name: Build Guest Parking APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle Wrapper
        working-directory: android
        run: gradle wrapper --gradle-version 8.4

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Copy APK to root
        run: cp android/app/build/outputs/apk/debug/app-debug.apk ./app-guest.apk

      - name: Commit APK to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app-guest.apk -f
          git commit -m "APK auto-build" || echo "No changes"
          git push

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: guest-parking-apk
          path: app-guest.apk
